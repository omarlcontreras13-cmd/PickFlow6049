<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick Ticket Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f6fa; --surface: #ffffff; --surface2: #eef1f8;
    --border: #d0d7e8; --accent: #3d5ce6; --accent2: #1a9e7a;
    --text: #1a1f36; --text2: #5a6484; --danger: #e03e3e;
    --success: #1a9e7a; --warning: #d97706;
    --font: 'Courier New', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 18px; font-weight: bold; letter-spacing: 2px; color: var(--accent); }
  .logo span { color: var(--accent2); }
  .status-bar { display: flex; gap: 16px; font-size: 11px; color: var(--text2); }
  .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--success); margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .main { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 57px); }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 1px; color: var(--text2); text-transform: uppercase; }
  .sidebar-actions { padding: 12px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); }
  .btn { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-family: var(--font); font-size: 12px; letter-spacing: 1px; transition: all 0.15s; display: flex; align-items: center; gap: 8px; justify-content: center; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { background: #3d5ce6; color: white; }
  .btn-success { background: var(--accent2); border-color: var(--accent2); color: #0f1117; }
  .btn-success:hover { background: #2ec99a; color: #0f1117; }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: white; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ticket-list { flex: 1; overflow-y: auto; padding: 8px; }
  .ticket-item { padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 6px; cursor: pointer; transition: all 0.15s; }
  .ticket-item:hover { border-color: var(--accent); }
  .ticket-item.active { border-color: var(--accent); background: rgba(79,110,247,0.1); }
  .ticket-item .tid { font-size: 11px; color: var(--accent); letter-spacing: 1px; }
  .ticket-item .tname { font-size: 12px; color: var(--text); margin: 2px 0; }
  .ticket-item .tmeta { font-size:10px; color: var(--text2); }
  .content { display: flex; flex-direction: column; overflow: hidden; }
  .panel { flex: 1; overflow-y: auto; padding: 24px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-label { font-size: 10px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: bold; color: var(--accent); }
  .stat-value.green { color: var(--accent2); }
  .stat-value.yellow { color: var(--warning); }
  .section-title { font-size: 11px; letter-spacing: 2px; color: var(--text2); text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .ticket-form { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 11px; color: var(--text2); letter-spacing: 1px; }
  .form-group input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: var(--font); font-size: 12px; outline: none; transition: border-color 0.15s; }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text2); }
  .sku-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .sku-table th { padding: 8px 10px; text-align: left; font-size: 10px; letter-spacing: 1px; color: var(--text2); border-bottom: 1px solid var(--border); font-weight: normal; }
  .sku-table td { padding: 8px 10px; border-bottom: 1px solid rgba(46,50,80,0.5); vertical-align: middle; }
  .sku-table tr:last-child td { border-bottom: none; }
  .sku-table tr:hover td { background: rgba(79,110,247,0.05); }
  .cap-table-wrap { overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 320px);position:relative; }
  .cap-table { width:100%;border-collapse:collapse;font-size:11px; }
  .cap-table th { position:sticky;top:0;z-index:2;background:var(--surface);border-bottom:2px solid var(--border);padding:8px 10px;text-align:left;font-size:10px;letter-spacing:1px;color:var(--text2);white-space:nowrap; }
  .cap-table td { border-bottom:1px solid var(--border);padding:7px 10px;vertical-align:top; }
  .cap-table tr:hover td { background:rgba(79,110,247,0.03); }
  .loc-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 11px; }
  .loc-empty { color: var(--text2); font-size: 11px; }
  .sku-row-input { display: grid; grid-template-columns: 140px 100px auto; gap: 8px; align-items: center; margin-bottom: 8px; }
  .sku-row-input input { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; color: var(--text); font-family: var(--font); font-size: 12px; outline: none; }
  .sku-row-input input:focus { border-color: var(--accent); }
  .ticket-header { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; }
  .ticket-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .alert { padding: 10px 14px; border-radius: 6px; font-size: 12px; margin-bottom: 12px; }
  .alert-info { background: rgba(79,110,247,0.1); border: 1px solid rgba(79,110,247,0.3); color: var(--accent); }
  .alert-success { background: rgba(56,217,169,0.1); border: 1px solid rgba(56,217,169,0.3); color: var(--accent2); }
  .alert-warning { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: var(--warning); }
  .alert-danger { background: rgba(240,101,101,0.1); border: 1px solid rgba(240,101,101,0.3); color: var(--danger); }
  .toast-host { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10001; display:flex; flex-direction:column; gap:12px; align-items:center; pointer-events:none; width:max-content; max-width:90vw; }
  .toast { pointer-events:auto; min-width:340px; max-width:620px; padding:20px 30px; border-radius:14px; font-size:16px; line-height:1.6; text-align:center; color:var(--text); background:var(--surface); border:2px solid var(--border); box-shadow:0 18px 50px rgba(26,31,54,0.28); animation:toastIn .18s ease-out; }
  .toast-success { border-color:var(--accent2); }
  .toast-info { border-color:var(--accent); }
  .toast-warning { border-color:var(--warning); }
  .toast-danger { border-color:var(--danger); }
  @keyframes toastIn { from{opacity:0; transform:translateY(8px) scale(.96)} to{opacity:1; transform:translateY(0) scale(1)} }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 14px; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 12px; }
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 14px; letter-spacing: 2px; margin-bottom: 20px; color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .sync-indicator { display:inline-flex; align-items:center; gap:6px; font-size:11px; padding:3px 8px; border-radius:4px; }
  .sync-ok { color:var(--accent2); }
  .sync-err { color:var(--danger); }
  .sync-pending { color:var(--warning); }

  .login-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999; }
  .login-box { background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;text-align:center; }
  .login-logo { font-size:28px;font-weight:bold;letter-spacing:3px;color:var(--accent);margin-bottom:4px; }
  .login-logo span { color:var(--accent2); }
  .login-loc { font-size:13px;color:var(--accent2);font-weight:bold;margin-bottom:28px;letter-spacing:1px; }
  .login-sub { font-size:11px;color:var(--text2);letter-spacing:2px;margin-bottom:32px; }
  .user-select { display:flex;flex-direction:column;gap:8px;margin-bottom:16px; }
  .user-btn { padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-family:var(--font);font-size:12px;transition:all 0.15s;text-align:left; }
  .user-btn:hover { border-color:var(--accent);color:var(--accent); }
  .user-btn.selected { border-color:var(--accent);background:rgba(79,110,247,0.15);color:var(--accent); }
  .user-role-badge { float:right;font-size:10px;padding:2px 6px;border-radius:3px;margin-top:1px; }
  .role-admin { background:rgba(251,191,36,0.2);color:var(--warning); }
  .role-user { background:rgba(56,217,169,0.2);color:var(--accent2); }
  .archive-item { padding:10px 12px;border-radius:6px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all 0.15s;opacity:0.8; }
  .archive-item:hover { border-color:var(--text2); }
  .archive-date-header { font-size:10px;color:var(--text2);letter-spacing:1px;padding:8px 4px 4px;border-bottom:1px solid var(--border);margin-bottom:6px; }
  .eod-indicator { font-size:10px;color:var(--warning);padding:4px 8px;background:rgba(251,191,36,0.1);border-radius:4px;border:1px solid rgba(251,191,36,0.3); }

  @media print {
    .header, .sidebar, .ticket-actions, .sku-row-input, .sidebar-actions { display: none !important; }
    .main { grid-template-columns: 1fr; }
    body { background: white; color: black; }
    .ticket-header, .sku-table th, .sku-table td { color: black !important; background: white !important; border-color: #ccc !important; }
  }
</style>
</head>

// ─── FIREBASE REAL-TIME SYNC ──────────────────────────────────────────────────
const FB_CONFIG = { databaseURL: "https://pickflow6049-default-rtdb.firebaseio.com" };
let db = null;
// Initialize Firebase after scripts load
function initFirebase() {
  try {
    if (typeof firebase === 'undefined') {
      // SDK not ready yet — silently return false, listenToFirebase will retry
      setSyncStatus('connecting');
      return false;
    }
    if (!firebase.apps.length) {
      firebase.initializeApp(FB_CONFIG);
    }
    db = firebase.database();
    return true;
  } catch(e) {
    // Silent retry — don't log errors during normal startup
    setSyncStatus('connecting');
    return false;
  }
}

function setSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  if (status==='ok') { el.className='sync-indicator sync-ok'; el.textContent='● SYNCED'; }
  else if (status==='err') { el.className='sync-indicator sync-err'; el.textContent='✕ SYNC ERROR'; }
  else { el.className='sync-indicator sync-pending'; el.textContent='⟳ SYNCING...'; }
}

function syncTicketsToFirebase() {
  if (!db) return;
  const data = {};
  state.tickets.forEach(t => { data[t.id] = t; });
  db.ref('tickets').set(data)
    .then(() => setSyncStatus('ok'))
    .catch(() => setSyncStatus('err'));
}

function syncQtyGuideToFirebase() {
  if (!db) return;
  db.ref('qtyGuide').set({ guide: state.qtyGuide, names: state.skuNames })
    .catch(e => console.error('QTY sync error', e));
}

function syncInventoryToFirebase() {
  const compact = state.inventory.map(r => ({
    s: r.sku, p: r.pcs, l: r.location,
    e: r.expDate ? r.expDate.getTime() : null,
    lot: r.lot||'', skid: r.skid||'', po: r.po||'',
    gw: r.grossWt||'', bol: r.bol||'', pp: r.pcsPending||0, pi2: r.prodId2||'', cu: r.customer||'', dr: r.dateRecd ? r.dateRecd.getTime() : null
  }));
  db.ref('inventory').set(compact)
    .then(() => showAlert('✓ Inventory synced to all users.', 'success'))
    .catch(e => console.error('Inventory sync error', e));
  // Also sync rawInventory
  const rawCompact = state.rawInventory.map(r => ({
    s: r.sku, p: r.pcs, l: r.location,
    e: r.expDate ? r.expDate.getTime() : null,
    st: r.status||'', lot: r.lot||'', skid: r.skid||'',
    po: r.po||'', gw: r.grossWt||'', bol: r.bol||'', pp: r.pcsPending||0, pi2: r.prodId2||'', cu: r.customer||'', dr: r.dateRecd ? r.dateRecd.getTime() : null
  }));
  db.ref('rawInventory').set(rawCompact).catch(e => console.error('Raw inv sync error', e));
}

function listenToFirebase() {
  if (!initFirebase()) {
    // Retry after 2 seconds if Firebase not ready
    setTimeout(listenToFirebase, 2000);
    return;
  }
  setSyncStatus('connecting');

  db.ref('tickets').on('value', snap => {
    const data = snap.val() || {};
    const incoming = Object.values(data);
    const remoteIds = new Set(incoming.map(t => t.id));
    // Add/update from Firebase
    incoming.forEach(t => {
      const idx = state.tickets.findIndex(lt => lt.id === t.id);
      if (idx >= 0) state.tickets[idx] = t;
      else state.tickets.push(t);
    });
    // Remove deleted
    state.tickets = state.tickets.filter(t => remoteIds.has(t.id));
    state.tickets.sort((a,b) => a.created - b.created);
    updateTicketList();
    if (!panelBusy()) {
      if (state.activeTicket) {
        const still = state.tickets.find(t => t.id === state.activeTicket);
        if (still) viewTicket(state.activeTicket);
        else { state.activeTicket = null; showDashboard(); }
      } else if (state.dataLoaded) {
        showDashboard();
      }
    }
    setSyncStatus('ok');
  }, () => setSyncStatus('err'));

  db.ref('qtyGuide').on('value', snap => {
    const data = snap.val();
    if (data && data.guide && Object.keys(data.guide).length > 0) {
      state.qtyGuide = data.guide;
      state.skuNames = data.names || {};
      try { localStorage.setItem('pickflow_v2', JSON.stringify({ qtyGuide: state.qtyGuide, skuNames: state.skuNames })); } catch(e) {}
      if (state.inventory.length > 0 && state.helper.length === 0) {
        buildHelper();
      }
    }
  });

  db.ref('lastImport').on('value', snap => {
    const ts = snap.val();
    if (ts) {
      state.lastImport = ts;
      updateImportStamp();
    }
  });

  db.ref('settings').on('value', snap => {
    const data = snap.val();
    if (!data) return;
    // Apply user roles and passwords
    if (data.userSettings) {
      USERS.forEach(u => {
        if (data.userSettings[u.id]) {
          u.role = data.userSettings[u.id].role || u.role;
          const pwd = data.userSettings[u.id].password;
          u.password = (pwd === '__none__' || pwd === null || pwd === undefined) ? null : pwd;
        }
      });
      // Update current user if their settings changed
      if (state.currentUser) {
        const updated = USERS.find(u => u.id === state.currentUser.id);
        if (updated) {
          state.currentUser.role = updated.role;
          state.currentUser.password = updated.password;
        }
      }
    } else if (data.userRoles) {
      // Legacy support for old format
      USERS.forEach(u => {
        if (data.userRoles[u.id]) u.role = data.userRoles[u.id].role;
      });
    }
    // Apply EOD settings
    if (data.eodTime) state.eodTime = data.eodTime;
    if (data.eodEnabled !== undefined) state.eodEnabled = data.eodEnabled;
  });

  db.ref('archive').on('value', snap => {
    const data = snap.val();
    if (data && Array.isArray(data)) {
      state.archivedTickets = data;
      if (state.sidebarTab === 'archive') renderArchiveList();
    }
  });

  db.ref('capacityRef').on('value', snap => {
    const data = snap.val();
    if (data && Object.keys(data).length) {
      state.capacityRef = data;
      if (document.getElementById('cap-filter-loc')) showLocationCapacity();
    }
  });

  db.ref('rawInventory').on('value', snap => {
    const data = snap.val();
    if (data && Array.isArray(data) && data.length > 0) {
      state.rawInventory = data.map(r => ({
        sku: r.s ?? r.sku, pcs: r.p ?? r.pcs, location: r.l ?? r.location,
        expDate: (r.e ?? r.expDate) ? new Date(r.e ?? r.expDate) : null,
        status: r.st ?? r.status ?? 'AVAILABLE', lot: r.lot||'', skid: r.skid||'',

function genId(callback) {
  if (!db) {
    // Fallback if Firebase not ready
    const ts = Date.now().toString().slice(-5);
    callback('PT-' + ts.padStart(5,'0'));
    return;
  }
  db.ref('ticketCounter').transaction(current => {
    return (current || 0) + 1;
  }).then(result => {
    if (result.committed) {
      const num = result.snapshot.val();
      callback('PT-' + String(num).padStart(5,'0'));
    } else {
      callback('PT-' + String(Date.now()).slice(-5));
    }
  }).catch(() => {
    callback('PT-' + String(Date.now()).slice(-5));
  });
}

function updateClock() {

  const timeStr = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
  // Determine EST vs EDT based on daylight saving time
  const jan = new Date(now.getFullYear(), 0, 1).getTimezoneOffset();
  const jul = new Date(now.getFullYear(), 6, 1).getTimezoneOffset();
  const isDST = now.getTimezoneOffset() < Math.max(jan, jul);
  const tz = isDST ? 'EDT' : 'EST';
  document.getElementById('current-time').textContent = dateStr + ' ' + timeStr + ' ' + tz;
}

function archiveTicket(id, silent=false) {
  if (!isAdmin()) { showAlert('Only admins can archive tickets.', 'warning'); return; }
  const ticket = state.tickets.find(t => t.id === id);
  if (!ticket) return;
  if (!silent && !confirm('Archive this pick ticket?')) return;
  ticket.archivedAt = Date.now();
  ticket.archivedBy = state.currentUser ? state.currentUser.name : 'System';
  state.archivedTickets.push(ticket);
  state.tickets = state.tickets.filter(t => t.id !== id);
  if (state.activeTicket === id) { state.activeTicket = null; }
  // Purge tickets older than 90 days
  const cutoff = Date.now() - (90 * 24 * 60 * 60 * 1000);
  state.archivedTickets = state.archivedTickets.filter(t => t.archivedAt > cutoff);
  saveState();
  syncArchiveToFirebase();
  updateTicketList();
  showDashboard();
  if (!silent) showAlert('✓ Ticket archived.', 'success');
}

function archiveAll(silent=false) {
  if (!isAdmin()) { showAlert('Only admins can archive tickets.', 'warning'); return; }
  if (!silent && !confirm('Archive ALL open tickets?')) return;
  const count = state.tickets.length;
  state.tickets.forEach(t => {
    t.archivedAt = Date.now();
    t.archivedBy = state.currentUser ? state.currentUser.name : 'EOD Auto';
    state.archivedTickets.push(t);
  });
  state.tickets = [];
  state.activeTicket = null;
  const cutoff = Date.now() - (90 * 24 * 60 * 60 * 1000);
  state.archivedTickets = state.archivedTickets.filter(t => t.archivedAt > cutoff);
  saveState();
  syncArchiveToFirebase();
  updateTicketList();
  showDashboard();
  if (!silent) showAlert('✓ ' + count + ' tickets archived.', 'success');
}

function restoreTicket(id) {
  if (!isAdmin()) { showAlert('Only admins can restore tickets.', 'warning'); return; }
  const ticket = state.archivedTickets.find(t => t.id === id);
  if (!ticket) return;
  delete ticket.archivedAt;
  delete ticket.archivedBy;
  state.tickets.push(ticket);
  state.tickets.sort((a,b) => a.created - b.created);
  state.archivedTickets = state.archivedTickets.filter(t => t.id !== id);
  saveState();
  syncArchiveToFirebase();
  switchSidebarTab('open');
  showAlert('✓ Ticket restored to open.', 'success');
}

// ─── EOD SCHEDULER ────────────────────────────────────────────────────────────
function getEasternTime() {
  // Get current time in Eastern timezone (handles EST/EDT automatically)
  const now = new Date();
  const eastern = new Date(now.toLocaleString('en-US', {timeZone: 'America/New_York'}));
  return eastern;
}

function getEasternTZ() {
  const now = new Date();
  const jan = new Date(now.getFullYear(),0,1).getTimezoneOffset();
  const jul = new Date(now.getFullYear(),6,1).getTimezoneOffset();
  return now.getTimezoneOffset() < Math.max(jan,jul) ? 'EDT' : 'EST';
}

let eodFired = false; // Prevent multiple firings in same minute
function setupEodTimer() {
  if (eodTimer) clearInterval(eodTimer);
  eodFired = false;
  let lastCheckedDay = '';

  eodTimer = setInterval(() => {
    if (!state.eodEnabled) return;
    if (!state.currentUser) return;
    if (!state.eodTime) return;

    const eastern = getEasternTime();
    const [h, m] = state.eodTime.split(':').map(Number);
    const nowH = eastern.getHours();
    const nowM = eastern.getMinutes();
    const todayKey = eastern.toLocaleDateString('en-US') + '_' + state.eodTime;

    // Reset fired flag each new day
    if (lastCheckedDay && lastCheckedDay !== eastern.toLocaleDateString('en-US')) {
      eodFired = false;
    }
    lastCheckedDay = eastern.toLocaleDateString('en-US');

    // Fire if at or past the target time and not already fired today
    // (catches delayed/throttled intervals that miss the exact minute)
    const totalNow    = nowH * 60 + nowM;
    const totalTarget = h * 60 + m;
    if (totalNow >= totalTarget && !eodFired) {
      eodFired = true;
      if (!db) {
        // No Firebase - just archive directly if admin
        if (isAdmin()) { archiveAll(true); showAlert('EOD: Tickets auto-archived.', 'success'); }
        return;
      }
      const eodKey = 'eod_' + todayKey.replace(/[/:]/g, '-').replace(/\s/g, '_');
      db.ref('eodLock/' + eodKey).transaction(current => {
        if (current === null) return true; // claim lock
        return undefined; // already fired
      }).then(result => {
        if (result.committed) {
          archiveAll(true);
          showAlert('EOD: All tickets auto-archived at ' + state.eodTime + ' ET', 'success');
        }
      }).catch(() => {
        if (isAdmin()) { archiveAll(true); showAlert('EOD: Tickets auto-archived.', 'success'); }
      });
    }
  }, 5000); // Check every 5 seconds for reliability
}

function exportBackup() {

    const backup = {
      _app: 'PickFlow6049',
      _exportedAt: d.toISOString(),
      _database: (typeof FB_CONFIG!=='undefined' && FB_CONFIG.databaseURL) ? FB_CONFIG.databaseURL : '',
      tickets: state.tickets || [],

      capacityRef: state.capacityRef || {},
      lastImport: state.lastImport || null,
      ticketCounter: state.ticketCounter || 0
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'PickFlow6049_Backup_'+stamp+'.json';

function exportQtyGuide() {

  const src = state.rawInventory.length ? state.rawInventory : state.inventory;
  const skuCust = {};
  src.forEach(r => { if (r.sku && !(r.sku in skuCust)) skuCust[r.sku] = r.customer || ''; });
  const allSkus = new Set([...Object.keys(state.qtyGuide), ...Object.keys(skuCust)]);
  if (!allSkus.size) { showAlert('No SKUs yet — import inventory or a QTY guide first.', 'warning'); return; }
  const data = [...allSkus].sort().map(sku => ({

function nxEdit(i,k,v){
  if(k==='qty'){ NX.lines[i].qty=(v===''?'':+v); nxDistribute(); }
  else if(k==='weight'||k==='lotStart'){ NX.lines[i][k]=(v===''?'':+v); }
  else { NX.lines[i][k]=(typeof v==='string'?v.toUpperCase():v); }
}
function nxAddLine(){
  const po=nxGv('nx-po').trim();
  NX.lines.push({ po, refLine:'', desc:'', mfrItem:'', grade:'', uom:'P', qty:'', weight:'', lotStart:1 });
  nxRenderLines(); nxResetPreview(); nxDistribute();
}
function nxRemoveLine(i){ NX.lines.splice(i,1); nxRenderLines(); nxResetPreview(); nxDistribute(); }
function nxClear(){ NX.lines=[]; nxRenderLines(); nxResetPreview(); nxDistribute(); }

function nxDistribute(){
  const lw=parseFloat(nxGv('nx-loadwt'));
  const ind=document.getElementById('nx-perunit');
  const lines=NX.lines.map((ln,i)=>({ln,i})).filter(x=>x.ln.qty&&+x.ln.qty>0);
  if(!lw||lw<=0){ return; }
  const totalQty=lines.reduce((s,x)=>s+(+x.ln.qty),0);
  if(totalQty<=0){ return; }
  const per=lw/totalQty; let acc=0;
  lines.forEach((x,k)=>{
    let w;
    if(k<lines.length-1){ w=Math.round(per*(+x.ln.qty)*10000)/10000; acc+=w; }
    else { w=Math.round((lw-acc)*10000)/10000; }
    x.ln.weight=w;
    const inp=document.querySelector(`.nx-wt[data-i="${x.i}"]`); if(inp) inp.value=w;
  });
}

function nxResetPreview(){ NX.exportRows=[]; const w=document.getElementById('nx-prevwrap'); if(w)w.style.display='none'; const s=document.getElementById('nx-sum'); if(s)s.style.display='none'; const e=document.getElementById('nx-prevempty'); if(e)e.style.display='block'; const ex=document.getElementById('nx-export'); if(ex)ex.disabled=true; const sv=document.getElementById('nx-save'); if(sv)sv.disabled=true; }
function nxGenerate(){
  const active=NX.lines.map((ln,i)=>({ln,i})).filter(x=>x.ln.qty && +x.ln.qty>0);
  if(!active.length){ nxStatus('Enter a qty on at least one line','var(--danger)'); return; }
  const missing=[]; active.forEach(({ln,i})=>{ if(!ln.grade)missing.push(`line ${i+1} SKU`); if(ln.weight===''||ln.weight==null)missing.push(`line ${i+1} weight`); });
  if(missing.length){ nxStatus('Fill: '+missing.slice(0,3).join(', ')+(missing.length>3?'…':''),'var(--danger)'); return; }
  const dv=nxGv('nx-date'), expDate=dv?new Date(dv+'T00:00:00'):new Date();
  NX.exportRows=[];
  active.forEach(({ln})=>{ const qty=+ln.qty,total=+ln.weight,start=+ln.lotStart||1,w=nxAlloc(total,qty);
    const productID=[ln.desc,ln.mfrItem].filter(Boolean).join(' ');
    for(let k=0;k<qty;k++){ NX.exportRows.push({ sku:ln.grade, productID, lot:nxLot(ln.po,ln.refLine,start+k), prodID2:ln.po, po:ln.po, weight:w[k], gross:w[k], uom:ln.uom||'P', lf:'', pcs:1, width:'', expDate:expDate.getTime() }); }
  });
  nxRenderPreview(); nxStatus(`Generated ${NX.exportRows.length} row(s)`,'var(--accent2)');
}

  document.getElementById('nx-export').disabled=false; document.getElementById('nx-save').disabled=false;
}

function nxSave(){
  if(!NX.exportRows.length){ nxStatus('Generate rows first','var(--danger)'); return; }

  const existing=state.nexusReceipts.find(r=>r.id===id);
  const U=id=>nxGv(id).trim().toUpperCase();

    customer:U('nx-customer'), vendor:U('nx-vendor'), loadWeight:nxGv('nx-loadwt'),
    expDate:NX.exportRows[0].expDate, totalRolls:NX.exportRows.length,

  const idx=state.nexusReceipts.findIndex(r=>r.id===id);

  set('nx-bol',r.bol); set('nx-po',r.po); set('nx-invoice',r.invoice); set('nx-truck',r.truck);
  set('nx-customer', r.customer!=null?r.customer:(r.mfr||'')); set('nx-vendor',r.vendor); set('nx-loadwt',r.loadWeight||'');
  const d=new Date(r.expDate),p=n=>String(n).padStart(2,'0'); set('nx-date',`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`);
  nxHdr();
  NX.lines=JSON.parse(JSON.stringify(r.lines||[])); nxRenderLines(); nxDistribute();
  NX.exportRows=JSON.parse(JSON.stringify(r.rows||[]));
  if(NX.exportRows.length) nxRenderPreview(); else nxResetPreview();
  nxRenderSaved(); nxStatus('');
}

// ── Export — EXACT match to Export_Template.xlsx (Sheet1) ────────────────────
function nxExport(){
  if(!NX.exportRows.length) return;
  const rows=NX.exportRows;
  const expDate=new Date(rows[0].expDate), serial=nxSerial(expDate);
  const ws={};
  const LBL=(addr,v)=>{ ws[addr]={t:'s',v:v}; };                  // static template labels
  const PUT=(addr,v)=>{                                           // value cell — 0 if empty
    if(v===''||v==null){ ws[addr]={t:'n',v:0}; }
    else if(typeof v==='number'){ ws[addr]={t:'n',v}; }
    else { ws[addr]={t:'s',v:String(v)}; }
  };
  const DATE=(addr)=>{ ws[addr]={t:'n', v:serial, z:'m/d/yy'}; }; // Excel built-in Short Date (numFmt 14)
  // header block — exact template cells
  LBL('A2','Receiver');          PUT('B2', nxGv('nx-bol').trim().toUpperCase());
  LBL('D2','Total Rolls');       PUT('E2', rows.length);
  LBL('H2','Fraction  Decimal');
  LBL('A3','PO #');              PUT('B3', nxB3());
  PUT('H3',0.5);                 PUT('I3',0.5);
  LBL('A4','Invoice #');         PUT('B4', nxGv('nx-invoice').trim().toUpperCase());
  LBL('A5','Truck #');           PUT('B5', nxGv('nx-truck').trim().toUpperCase());
  LBL('H5','Piper IBD Order #');
  // data headers (row 8)
  const HDR=['SKU','Product ID','Lot#','Prod ID 2','PO#','Weight','Gross Weight','UOM','LF','Pcs','Width','Exp Date'];
  const COL=['A','B','C','D','E','F','G','H','I','J','K','L'];
  HDR.forEach((h,i)=>LBL(COL[i]+'8',h));
  // data rows from row 9 — empties (LF, Width, blank Product ID, etc.) become 0
  rows.forEach((r,ri)=>{ const R=9+ri;
    PUT('A'+R,r.sku); PUT('B'+R,r.productID); PUT('C'+R,r.lot); PUT('D'+R,r.prodID2); PUT('E'+R,r.po);
    PUT('F'+R,r.weight); PUT('G'+R,r.gross); PUT('H'+R,r.uom); PUT('I'+R,0); PUT('J'+R,r.pcs); PUT('K'+R,r.width);
    DATE('L'+R);
  });
  ws['!ref']='A1:L'+(8+rows.length);
  ws['!cols']=[{wch:8.71},{wch:30.57},{wch:13.43},{wch:10.29},{wch:8.71},{wch:7},{wch:12.57},{wch:16.57},{wch:6},{wch:4.14},{wch:6.14},{wch:8.43}];
  const wb=XLSX.utils.book_new();
  wb.SheetNames.push('Sheet1'); wb.Sheets['Sheet1']=ws;
  const po=nxGv('nx-po').trim()||'NEXUS';
  XLSX.writeFile(wb,`Nexus_EDI_${po}_${expDate.getFullYear()}${String(expDate.getMonth()+1).padStart(2,'0')}${String(expDate.getDate()).padStart(2,'0')}.xlsx`);
  nxStatus('EDI file exported','var(--accent2)');
}


function handleFileImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary', cellDates: true });
      processImport(wb);
    } catch(err) { showAlert('Import failed: ' + err.message, 'danger'); }
  };
  reader.readAsBinaryString(file);
  e.target.value = '';
}

function processImport(wb) {
  const sheets = wb.SheetNames;

  if (state.importMode === 'capref') {
    const ws2 = wb.Sheets[wb.SheetNames[0]];
    const rows2 = XLSX.utils.sheet_to_json(ws2, { header:1, defval:null });
    if (!rows2.length) { showAlert('Empty capacity file.','danger'); return; }
    let hi2 = 0;
    for (let i=0;i<Math.min(5,rows2.length);i++) {
      if (rows2[i].some(c=>typeof c==='string'&&c.toLowerCase().includes('location'))) { hi2=i; break; }
    }
    const hdr2 = rows2[hi2];
    let locI2 = hdr2.findIndex(h=>typeof h==='string'&&h.toLowerCase().trim().includes('location'));
    let capI2 = hdr2.findIndex(h=>typeof h==='string'&&h.toLowerCase().includes('tot')&&h.toLowerCase().includes('cap'));
    if (capI2<0) capI2 = hdr2.findIndex(h=>typeof h==='string'&&h.toLowerCase().includes('cap'));
    if (locI2<0) locI2 = 5;
    if (capI2<0) capI2 = 7;
    state.capacityRef = {};
    let loaded = 0;
    for (let i=hi2+1;i<rows2.length;i++) {
      const loc2 = (rows2[i][locI2]||'').toString().trim();
      let cap2 = parseFloat(rows2[i][capI2]);
      if (isNaN(cap2)) {
        for (let c=rows2[i].length-1;c>=0;c--) {
          const v = parseFloat(rows2[i][c]);
          if (!isNaN(v)&&v>0) { cap2=v; break; }
        }
      }
      if (loc2 && !isNaN(cap2) && cap2>0) { state.capacityRef[loc2]=cap2; loaded++; }
    }
    if (!loaded) { showAlert('No valid location/capacity rows found.','warning'); return; }
    if (!db) { showAlert('No database connection.','danger'); return; }
    db.ref('capacityRef').set(state.capacityRef)
      .then(()=>{ showAlert('✓ Capacity reference loaded — '+loaded+' locations.','success'); if(document.getElementById('cap-filter-loc')) showLocationCapacity(); })
      .catch(e=>showAlert('Error: '+e.message,'danger'));
    return;
  }

  if (state.importMode === 'qty') {
    // QTY Guide: find sheet, find header row with SKU, read SKU + QTY PER PALLET + Name
    const ws = wb.Sheets[sheets[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:true });
    let hi = 0;
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      if (rows[i].some(c => typeof c === 'string' && c.trim().toUpperCase() === 'SKU')) { hi = i; break; }
    }
    const hdr = rows[hi];
    const si = hdr.findIndex(h => typeof h==='string' && h.trim().toUpperCase()==='SKU');
    const qi = hdr.findIndex(h => typeof h==='string' && h.trim().toUpperCase().includes('QTY'));
    const ni = hdr.findIndex(h => typeof h==='string' && h.trim().toUpperCase()==='NAME');
    state.qtyGuide = {}; state.skuNames = {};
    for (let i = hi+1; i < rows.length; i++) {
      const r = rows[i];
      const sku = r[si>=0?si:0]; const qty = r[qi>=0?qi:3]; const name = ni>=0?r[ni]:'';
      if (sku && qty && !isNaN(parseFloat(qty))) {
        const sk = sku.toString().trim();
        state.qtyGuide[sk] = parseFloat(qty);
        if (name) state.skuNames[sk] = name.toString().trim();
      }
    }
    saveState();
    syncQtyGuideToFirebase();
    syncQtyGuideToFirebase();
    showAlert('✓ QTY Guide loaded — ' + Object.keys(state.qtyGuide).length + ' SKUs saved to all users.', 'success');
    // If inventory already loaded, rebuild helper now
    if (state.inventory.length > 0) {
      buildHelper();
      state.dataLoaded = true;
      document.getElementById('new-ticket-btn').disabled = false;
      document.getElementById('preview-btn').disabled = false;
      document.getElementById('data-status').innerHTML = '<span class="status-dot"></span>DATA LOADED: ' + state.inventory.length + ' RECORDS';
      showDashboard();
    }
    document.getElementById('rebuild-btn').style.display = 'flex';
    return;
  }

  // Daily inventory: auto-detect header row by finding 'SKU' in first 10 rows
  let dataSheet = null, headerRowIdx = -1;
  for (const name of sheets) {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], { header:1, defval:'' });
    for (let i = 0; i < Math.min(10, rows.length); i++) {
      if (rows[i].some(c => typeof c==='string' && c.trim().toUpperCase()==='SKU')) {
        dataSheet = wb.Sheets[name]; headerRowIdx = i; break;
      }
    }
    if (dataSheet) break;
  }
  if (!dataSheet) { showAlert('Could not find SKU column in this file. Check the file format.', 'danger'); return; }

  const allRows = XLSX.utils.sheet_to_json(dataSheet, { header:1, defval:'', raw:false });
  const hdr = allRows[headerRowIdx];
  const ci = {};
  hdr.forEach((h,i) => { if(h) ci[h.toString().trim()] = i; });

  const skuI = ci['SKU'] ?? -1;
  const pcsI = ci['Pcs'] ?? -1;
  const locI = ci['Location'] ?? -1;
  const expI = ci['Expiration Date'] ?? -1;
  const stKey = Object.keys(ci).find(k => k.toLowerCase().includes('inventory status'));
  const stI = stKey ? ci[stKey] : -1;
  const pcsPendKey = Object.keys(ci).find(k => k.toLowerCase().replace(' ','').includes('pcspending'));
  const pcsPendI = pcsPendKey !== undefined ? ci[pcsPendKey] : -1;
  const lotI = ci['Lot #'] !== undefined ? ci['Lot #'] : -1;
  const skidI = ci['SkidID'] !== undefined ? ci['SkidID'] : -1;
  const poI = ci['PO #'] !== undefined ? ci['PO #'] : -1;
  const grossWtI = ci['Gross Weight'] !== undefined ? ci['Gross Weight'] : -1;
  const bolI = ci['Inbound BOL'] !== undefined ? ci['Inbound BOL'] : -1;
  // Prod ID 2 carries the PO reference for Nexus inventory (system PO# column not reliably mapped yet)
  const prodId2Key = Object.keys(ci).find(k => { const n=k.toLowerCase().replace(/[\s.]/g,''); return n==='prodid2'||n==='productid2'; });
  const prodId2I = prodId2Key !== undefined ? ci[prodId2Key] : -1;
  // Customer/Owner column from the WMS extract — source of truth for which customer the rows belong to (same as 6021)
  const custKey = Object.keys(ci).find(k => { const n=k.toLowerCase().trim(); return n==='customer'||n==='owner'||n==='client'||n==='customer name'||n==='cust'; });
  const custI = custKey !== undefined ? ci[custKey] : -1;
  // Product ID / item name column (the descriptive name). Must NOT collide with "Prod ID 2".
  const nameKey = Object.keys(ci).find(k => { const n=k.toLowerCase().replace(/[\s.]/g,''); return n==='productid'||n==='productname'||n==='name'||n==='description'||n==='itemdescription'||n==='item'||n==='flavor'; });
  const nameI = nameKey !== undefined ? ci[nameKey] : -1;
  // Date received / put-away date — drives the "recent put-away" suggestions (same as 6021's Date Rec'd)
  const dateRecdKey = Object.keys(ci).find(k => { const n=k.toLowerCase().replace(/[\s.'’]/g,''); return n==='daterecd'||n==='daterecvd'||n==='datereceived'||n==='receiveddate'||n==='recddate'||n==='putawaydate'||n==='putawaydate'||n==='datein'; });
  const dateRecdI = dateRecdKey !== undefined ? ci[dateRecdKey] : -1;

  if (skuI<0 || pcsI<0 || locI<0) {
    showAlert('Missing required columns. Found: ' + Object.keys(ci).join(', '), 'danger'); return;
  }

  const newInv = [];
  const newRaw = [];
  const incomingCustomers = new Set();
  for (let i = headerRowIdx+1; i < allRows.length; i++) {
    const r = allRows[i];
    const sku = (r[skuI]||'').toString().trim();
    const pcs = parseFloat(r[pcsI]);
    const loc = (r[locI]||'').toString().trim();
    const st = stI>=0 ? (r[stI]||'').toString().trim().toUpperCase() : 'AVAILABLE';
    const exp = expI>=0 ? r[expI] : null;
    const pcsPend = pcsPendI >= 0 ? (parseFloat(r[pcsPendI])||0) : 0;
    const lot = lotI >= 0 ? (r[lotI]||'').toString().trim() : '';
    const skid = skidI >= 0 ? (r[skidI]||'').toString().trim() : '';
    const po = poI >= 0 ? (r[poI]||'').toString().trim() : '';
    const grossWt = grossWtI >= 0 ? (r[grossWtI]||'').toString().trim() : '';
    const bol = bolI >= 0 ? (r[bolI]||'').toString().trim() : '';
    const prodId2 = prodId2I >= 0 ? (r[prodId2I]||'').toString().trim() : '';
    const dateRecd = dateRecdI >= 0 ? parseExpDate(r[dateRecdI]) : null;

    // Customer comes straight from the file. Canonicalize common variants so the rest of the app matches.
    let customer = custI >= 0 ? (r[custI]||'').toString().trim() : '';
    const cl = customer.toLowerCase();
    if (cl.includes('nexus')) customer = 'Nexus';
    else if (cl.includes('electrolit')) customer = 'Electrolit';
    else if (cl.includes('maxxon')) customer = 'Maxxon';

    if (!sku || isNaN(pcs) || pcs<=0 || !loc) continue;

    if (customer) incomingCustomers.add(customer);

    // Store ALL valid rows in rawInventory for the preview tab
    newRaw.push({ sku, pcs, pcsPending:pcsPend, location:loc,
      expDate:parseExpDate(exp), status:st||'AVAILABLE', lot, skid, po, grossWt, bol, prodId2, customer, dateRecd });

    // Additional filters for picking helper only
    if (st && st !== 'AVAILABLE') continue;
    if (EXCLUDED.some(ex => {
      const l = loc.toUpperCase(), e = ex.toUpperCase();
      if (ex === '22-19' || ex === '22-20') return l.startsWith(e);
      return l.includes(e);
    })) continue;
    if (pcsPend > 0) continue;
    newInv.push({ sku, pcs, pcsPending:pcsPend, location:loc,
      expDate:parseExpDate(exp), status:st||'AVAILABLE', lot, skid, po, grossWt, bol, prodId2, customer, dateRecd });
  }

  // Replace ONLY the customers present in this file; keep every other customer's rows
  // untouched. A blank customer cell never deletes a tagged customer. Order never matters.
  const replaceSet = incomingCustomers.size ? incomingCustomers : new Set(['']);
  state.rawInventory = state.rawInventory.filter(r => !replaceSet.has(r.customer||'')).concat(newRaw);
  state.inventory   = state.inventory.filter(r => !replaceSet.has(r.customer||'')).concat(newInv);

  buildHelper();
  state.dataLoaded = true;
  // Save inventory locally and sync to Firebase for all users
  try { localStorage.setItem('pickflow_inv', JSON.stringify(state.inventory)); } catch(e) {}
  try { localStorage.setItem('pickflow_rawinv', JSON.stringify(state.rawInventory)); } catch(e) {}
  state.lastImport = Date.now();
  syncInventoryToFirebase();
  db.ref('lastImport').set(state.lastImport).catch(e=>{});
  document.getElementById('new-ticket-btn').disabled = false;
  document.getElementById('preview-btn').disabled = false;
  document.getElementById('rebuild-btn').style.display = 'flex';
  document.getElementById('data-status').innerHTML = '<span class="status-dot"></span>DATA LOADED: ' + state.inventory.length + ' RECORDS';
  updateTicketList();
  const custNote = custI < 0 ? ' ⚠ No "Customer" column found (columns: ' + Object.keys(ci).join(', ') + ') — customers cannot be separated until it is present.' : '';
  showAlert('✓ Imported ' + ([...incomingCustomers].filter(Boolean).join(' + ') || 'inventory') + ' (' + newRaw.length + ' rows). Total on-hand: ' + state.inventory.length + ' records. QTY Guide: ' + Object.keys(state.qtyGuide).length + ' SKUs.' + custNote, custI<0?'warning':'success');
  showDashboard();
  saveState();
}

function parseExpDate(v) {
  if (!v) return null;
  if (v instanceof Date) return v;
  const d = new Date(v); return isNaN(d) ? null : d;
}

// ─── HELPER BUILD ─────────────────────────────────────────────────────────────
function buildHelperFrom(inv) {
  const locData = {};
  inv.forEach(row => {
    const pq = state.qtyGuide[row.sku];
    if (!pq || row.pcs !== pq) return;
    const key = row.sku+'|'+row.location;
    if (!locData[key]) locData[key] = { sku:row.sku, location:row.location, expDates:[] };
    locData[key].expDates.push(row.expDate);
  });
  const locList = Object.values(locData).map(d => ({
    sku:d.sku, location:d.location,
    oldestExp: d.expDates.filter(Boolean).sort((a,b)=>a-b)[0]||null,
    allExps: d.expDates
  }));
  locList.sort((a,b) => {
    if (a.sku!==b.sku) return a.sku.localeCompare(b.sku);
    const ea = a.oldestExp?a.oldestExp.getTime():0, eb = b.oldestExp?b.oldestExp.getTime():0;
    if (ea!==eb) return ea-eb;
    return a.location.localeCompare(b.location);
  });
  const skuLocs = {};
  locList.forEach(l => { if(!skuLocs[l.sku]) skuLocs[l.sku]=[]; skuLocs[l.sku].push(l); });
  const helper = [];
  const skuRanks = {};
  locList.forEach(loc => {
    if (!skuRanks[loc.sku]) skuRanks[loc.sku]=0;
    skuRanks[loc.sku]++;
    const rank = skuRanks[loc.sku];
    const skuLocList = skuLocs[loc.sku];
    const li = skuLocList.findIndex(l=>l.location===loc.location);
    const next = skuLocList[li+1];
    const nextOldest = next ? next.oldestExp : null;
    let capped = 0;
    loc.allExps.forEach(exp => { if((!exp) || (!nextOldest) || (exp<=nextOldest)) capped++; });
    helper.push({ sku:loc.sku, palletQty:state.qtyGuide[loc.sku]||0, location:loc.location, oldestExp:loc.oldestExp, availPallets:capped, rank });
  });
  return helper;
}
function buildHelper() {
  state.helper = buildHelperFrom(state.inventory);
  state.helperFifo = buildHelperFromFIFO(maxxonFifoSource());
}

function maxxonFifoSource() {
  // Source for Maxxon FIFO picks: ALL available skids (any zone, any customer tag), matched
  // downstream by SKU (same as Electrolit/FEFO matches by SKU). "Available" mirrors the app's
  // own definition: not already picked, and not ghost / damaged / cycle-count stock.
  const src = (state.rawInventory && state.rawInventory.length) ? state.rawInventory : state.inventory;
  return src.filter(r => {
    if ((r.pcsPending||0) > 0) return false;
    const l=(r.location||'').toUpperCase(), st=(r.status||'').toUpperCase();
    if (l.includes('22-GHOST')||st==='GHOST') return false;
    if (st==='DAMAGED'||l.includes('22-REWORK')) return false;
    if (l.includes('CYC_CNT')||l.includes('CYC-CNT')||l.includes('22-CYCLE')||st==='CYCLE COUNT') return false;
    return true;
  });
}
function buildHelperFromFIFO(inv) {
  // Maxxon FIFO: rank pick locations by DATE RECEIVED (oldest first). NO restrictions —
  // every AVAILABLE skid is one pallet position; no EXCLUDED-zone or full-pallet gating,
  // and SKUs do not need to be in the QTY Guide just to be displayed.
  const toDate = x => { if (!x) return null; const d = (x instanceof Date) ? x : new Date(x); return isNaN(d) ? null : d; };
  const oldest = arr => arr.filter(Boolean).sort((a,b)=>a-b)[0]||null;
  const locData = {};
  inv.forEach(row => {
    const key = row.sku+'|'+row.location;
    if (!locData[key]) locData[key] = { sku:row.sku, location:row.location, recd:[], expDates:[], pallets:0 };
    locData[key].recd.push(toDate(row.dateRecd));
    locData[key].expDates.push(toDate(row.expDate));
    locData[key].pallets += 1; // each inventory record = one skid / pallet position
  });
  const locList = Object.values(locData).map(d => ({
    sku:d.sku, location:d.location,
    oldestRecd: oldest(d.recd), oldestExp: oldest(d.expDates), pallets:d.pallets
  }));
  locList.sort((a,b) => {
    if (a.sku!==b.sku) return a.sku.localeCompare(b.sku);
    const ra = a.oldestRecd?a.oldestRecd.getTime():Infinity, rb = b.oldestRecd?b.oldestRecd.getTime():Infinity;
    if (ra!==rb) return ra-rb;
    return a.location.localeCompare(b.location);
  });
  const helper = []; const skuRanks = {};
  locList.forEach(loc => {
    if (!skuRanks[loc.sku]) skuRanks[loc.sku]=0;
    skuRanks[loc.sku]++;
    helper.push({ sku:loc.sku, palletQty:state.qtyGuide[loc.sku]||0, location:loc.location, oldestExp:loc.oldestExp, oldestRecd:loc.oldestRecd, availPallets:loc.pallets, rank:skuRanks[loc.sku] });
  });
  return helper;
}

// ─── ALLOCATIONS ─────────────────────────────────────────────────────────────
// poNorm = normalized PO# for PO-scoped (Nexus) tickets, or null for standard SKU tickets.
// Standard tickets only consume from prior standard tickets; PO tickets only from prior tickets on the SAME PO#.
function getAllocatedBefore(ticketId, helper, poNorm, fifoScope) {
  helper = helper || state.helper;
  poNorm = poNorm || null;
  const alloc = {};
  const sorted = [...state.tickets].sort((a,b) => a.created - b.created);
  for (const t of sorted) {
    if (t.id === ticketId) break;
    const tPo = (t.po||'').trim();
    if (poNorm) { if (tPo !== poNorm) continue; }
    else { if (tPo) continue; if (!!fifoScope !== !!t.fifo) continue; }
    t.skus.forEach(sr => {
      if (!sr.sku || !sr.pcs) return;
      const pq = state.qtyGuide[sr.sku]; if (!pq) return;
      let need = Math.floor(sr.pcs / pq); if (need <= 0) return;
      helper.filter(h => h.sku === sr.sku).sort((a,b) => a.rank - b.rank).forEach(row => {
        if (need <= 0) return;
        const key = sr.sku + '|' + row.location;
        const used = alloc[key] || 0;
        const avail = Math.max(0, row.availPallets - used);
        if (avail <= 0) return;
        const assign = Math.min(need, avail);
        alloc[key] = used + assign;
        need -= assign;
      });
    });
  }
  return alloc;
}

function computeTicketLocations(ticket) {
  // PO-scoped (Nexus) ticket: rank only the inventory carrying this PO#, otherwise identical logic.
  const poNorm = (ticket.po||'').trim();
  let helper, prior;
  if (poNorm) {
    // Nexus PO reference lives in Prod ID 2 on the inventory rows (system PO# column not reliably mapped)
    helper = buildHelperFrom(state.inventory.filter(r => (r.prodId2||'').trim() === poNorm));
    prior  = getAllocatedBefore(ticket.id, helper, poNorm);
  } else if (ticket.fifo) {
    // Maxxon FIFO ticket: rank by date received (first in, first out), scoped to Maxxon inventory. Electrolit/FEFO path untouched.
    helper = (state.helperFifo && state.helperFifo.length) ? state.helperFifo : buildHelperFromFIFO(maxxonFifoSource());
    prior  = getAllocatedBefore(ticket.id, helper, null, true);
  } else {
    helper = state.helper;
    prior  = getAllocatedBefore(ticket.id, helper, null);
  }
  return ticket.skus.map(sr => {
    if (!sr.sku) return { ...sr, palletsNeeded:0, locations:[], rows:[], error:null };
    if (ticket.fifo) {
      // Maxxon: show ALL available locations for this SKU in FIFO order (by date received).
      // Locations display even without a QTY Guide entry; the pallet COUNT needs the guide.
      const pqM = state.qtyGuide[sr.sku] || 0;
      const needM = pqM ? Math.floor((sr.pcs||0) / pqM) : 0;
      const rowsForSku = helper.filter(h => h.sku === sr.sku).sort((a,b)=>a.rank-b.rank);
      const locsM = []; let remM = needM;
      rowsForSku.forEach(row => {
        const key = sr.sku + '|' + row.location;
        const avail = Math.max(0, row.availPallets - (prior[key] || 0));
        if (avail <= 0) return;
        const assign = remM > 0 ? Math.min(remM, avail) : 0;
        locsM.push({ location:row.location, avail, assigned:assign, rank:row.rank, exp:row.oldestExp, recd:row.oldestRecd, displayOnly: assign===0 });
        remM -= assign;
      });
      const rowsM = []; for (let i=0;i<locsM.length;i+=4) rowsM.push(locsM.slice(i,i+4));
      // Diagnostic so an empty result is never silent:
      let errM = null;
      if (!pqM) errM = 'Add SKU to QTY Guide for pallet count';
      else if (!locsM.length) {
        const raw = (state.rawInventory && state.rawInventory.length) ? state.rawInventory : state.inventory;
        const anySku = raw.some(r => (r.sku||'').toString().trim() === sr.sku);
        if (!rowsForSku.length) errM = anySku ? 'SKU found but no Available inventory' : 'No inventory loaded for SKU "'+sr.sku+'"';
        else errM = 'On-hand fully allocated to earlier tickets';
      }
      return { ...sr, palletQty:pqM, palletsNeeded:needM, locations:locsM, rows:rowsM, fulfilled: pqM ? remM<=0 : false, remaining:remM, error: errM };
    }
    const pq = state.qtyGuide[sr.sku];
    if (!pq) return { ...sr, palletQty:0, palletsNeeded:0, locations:[], rows:[], error:'SKU not in QTY guide' };
    const need = Math.floor((sr.pcs||0) / pq);
    const locs = []; let rem = need;
    const MIN_DISPLAY_AVAIL = 5; // always show enough locations to total at least 5 avail pallets
    helper.filter(h => h.sku === sr.sku).sort((a,b) => a.rank - b.rank).forEach(row => {
      const key = sr.sku + '|' + row.location;
      const avail = Math.max(0, row.availPallets - (prior[key] || 0));
      if (avail <= 0) return;
      const totalDisplayed = locs.reduce((s,l) => s + l.avail, 0);
      // Only extend display to 5 avail when the line requests exactly 1 pallet
      if (rem <= 0 && (need !== 1 || totalDisplayed >= MIN_DISPLAY_AVAIL)) return;
      const assign = rem > 0 ? Math.min(rem, avail) : 0; // 0 = display only
      locs.push({ location:row.location, avail, assigned:assign, rank:row.rank, exp:row.oldestExp, displayOnly: assign===0 });
      rem -= assign;
    });
    const rows = [];
    for (let i = 0; i < locs.length; i += 4) rows.push(locs.slice(i, i+4));
    return { ...sr, palletQty:pq, palletsNeeded:need, locations:locs, rows, fulfilled:rem<=0, remaining:rem, error:poNorm && !helper.some(h=>h.sku===sr.sku) ? 'No on-hand for this PO#' : null };
  });
}

function updateSkuTotals(ticket) {
  const validSkus = (ticket.skus||[]).filter(s=>s.sku&&s.pcs);
  const totalPcs = validSkus.reduce((sum,s)=>sum+(s.pcs||0),0);
  const totalPlts = validSkus.reduce((sum,s)=>{
    const pq = state.qtyGuide[(s.sku||'').trim()]||0;
    return sum + (pq ? Math.floor(s.pcs/pq) : 0);
  },0);
  const countEl = document.getElementById('totals-sku-count');
  const pcsEl = document.getElementById('totals-pcs');
  const pltsEl = document.getElementById('totals-plts');
  if (countEl) countEl.textContent = 'TOTALS (' + validSkus.length + ' SKUs)';
  if (pcsEl) pcsEl.textContent = totalPcs.toLocaleString();
  if (pltsEl) pltsEl.textContent = totalPlts;
}

function renderSkuInput(sku,idx,tid) {
  const pq = sku.sku ? (state.qtyGuide[sku.sku.trim()]||0) : 0;
  const pallets = pq && sku.pcs ? Math.floor(sku.pcs/pq) : 0;
  const skuName = sku.sku ? (state.skuNames[sku.sku.trim()]||'') : '';
  return `<div class="sku-row-input" style="grid-template-columns:130px 90px 70px 120px auto;gap:6px;align-items:center">
    <input type="text" placeholder="SKU #" value="${sku.sku||''}" onchange="updateSku('${tid}',${idx},'sku',this.value)" style="width:100%">
    <input type="number" placeholder="PCS" value="${sku.pcs||''}" onchange="updateSku('${tid}',${idx},'pcs',this.value)" style="width:100%">
    <div style="text-align:center;font-size:12px;font-weight:bold;color:${pallets>0?'var(--accent2)':'var(--text2)'};background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:5px 4px">${pallets||'—'}</div>
    <div style="font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${skuName}">${skuName||'—'}</div>
    <button onclick="removeSkuRow('${tid}',${idx})" ${idx===0?'style="visibility:hidden;':'style="'}background:none;border:1px solid var(--danger);color:var(--danger);border-radius:4px;padding:2px 7px;cursor:pointer;font-size:10px;font-family:var(--font);line-height:1">✕</button>
  </div>`;
}
function updateSku(tid,idx,field,val) {
  const t=state.tickets.find(t=>t.id===tid); if(!t) return;
  t.skus[idx][field]=field==='pcs'?parseFloat(val)||0:val.trim();
  // Re-render inputs to update pallet count and totals
  const inputsEl = document.getElementById('sku-inputs');
  if (inputsEl) inputsEl.innerHTML = t.skus.map((s,i)=>(t.po?renderNexusSkuInput(s,i,tid):renderSkuInput(s,i,tid))).join('');
  updateSkuTotals(t);
  saveState();
}
// Description for a Nexus pick line = what was received under that PO under that UOM (from saved inbound receipts)
function nexusDescFor(ticket, sku, uom) {
  if (!ticket || !ticket.po) return '';
  const po=(ticket.po||'').trim().toUpperCase();
  sku=(sku||'').trim().toUpperCase(); uom=(uom||'').trim().toUpperCase();
  if (!sku) return '';
  const recs=(state.nexusReceipts||[]).filter(r=>(r.po||'').trim().toUpperCase()===po);
  // primary: match grade (SKU) AND uom
  for (const rec of recs) for (const ln of (rec.lines||[])) {
    if ((ln.grade||'').toUpperCase()===sku && (ln.uom||'').toUpperCase()===uom && (ln.desc||'').trim()) return ln.desc.trim();
  }
  // fallback: match grade only (UOM not received under this PO)
  for (const rec of recs) for (const ln of (rec.lines||[])) {
    if ((ln.grade||'').toUpperCase()===sku && (ln.desc||'').trim()) return ln.desc.trim();
  }
  return '';
}
function renderNexusSkuInput(sku,idx,tid) {
  const t=state.tickets.find(t=>t.id===tid);
  const selSku=(sku.sku||'').toUpperCase();

function exportPickTicketWord(id, fromArchive=false) {

  // ── HEADER BOX — 5 rows: DATE/CLERK, ORDER/PICKER, CUSTOMER/DEST, APPT/PICKUP, NOTES
  const notesRow = ticket.notes ? 10 : 0;
  const hY = 28, hH = 40 + notesRow, col2 = pageW/2;
  doc.setDrawColor(200); doc.setLineWidth(0.3);
  doc.rect(margin, hY, pageW-margin*2, hH);
  doc.line(col2, hY, col2, hY+40); // divider only on first 4 rows
  doc.line(margin, hY+10, pageW-margin, hY+10);
  doc.line(margin, hY+20, pageW-margin, hY+20);
  doc.line(margin, hY+30, pageW-margin, hY+30);
  doc.line(margin, hY+40, pageW-margin, hY+40);

  // Labels

  doc.setFontSize(7); doc.setTextColor(130);
  doc.text('DATE',         margin+2, hY+7);
  doc.text('ORDER #',      margin+2, hY+17);
  doc.text('CUSTOMER',     margin+2, hY+27);
  doc.text('APPT.',        margin+2, hY+37);
  doc.text('CLERK',        col2+2,   hY+7);
  doc.text('PICKER',       col2+2,   hY+17);
  doc.text('DEST.',        col2+2,   hY+27);
  doc.text('PICK UP DATE', col2+2,   hY+37);
  if (ticket.notes) doc.text('NOTES', margin+2, hY+47);

  // Values
  doc.setFont('helvetica','bold');
  doc.setFontSize(9); doc.setTextColor(20);
  const _fmtAppt = ticket.appt ? new Date('1970-01-01T'+ticket.appt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : '—';
  const _fmtPickup = ticket.pickupDate ? new Date(ticket.pickupDate+'T00:00:00').toLocaleDateString() : '—';
  doc.text(fmtDate,                                    margin+22, hY+7);
  doc.text((ticket.orderNum||'—') + (ticket.po?'    ·    PO# '+ticket.po:''),     margin+22, hY+17);
  doc.text((ticket.customer||'—').substring(0,35),     margin+22, hY+27);
  doc.text(_fmtAppt,                                   margin+22, hY+37);
  doc.text(ticket.creator||'—',                        col2+22,   hY+7);
  doc.text(ticket.picker||'—',                         col2+22,   hY+17);
  doc.text((ticket.dest||'—').substring(0,35),         col2+22,   hY+27);
  doc.text(_fmtPickup,                                 col2+22,   hY+37);
  if (ticket.notes) doc.text((ticket.notes||'').substring(0,80), margin+16, hY+47);

  // ── SKU TABLE ─────────────────────────────────────────────────────────────
  const tableRows = [];
  let totalPcs = 0, totalPallets = 0;
  computed.forEach(c => {
    if (!c.sku) return;
    totalPcs += c.pcs||0;
    totalPallets += c.palletsNeeded||0;
    const locs = c.locations||[];
    const groups = [];
    for (let i=0; i<Math.max(locs.length,1); i+=LOCS_PER_ROW) groups.push(locs.slice(i,i+LOCS_PER_ROW));
    if (!groups.length) groups.push([]);
    groups.forEach((grp, gi) => {
      const cells = Array(LOCS_PER_ROW).fill(null).map((_,li)=>grp[li]||null);
      tableRows.push([
        gi===0 ? String(c.sku) : '',
        gi===0 ? (state.skuNames[c.sku]||'') : '',
        gi===0 ? (c.pcs||'') : '',
        gi===0 ? (c.palletsNeeded||'') : '',
        cells[0]?cells[0].location:'', cells[0]?cells[0].avail:'',
        cells[1]?cells[1].location:'', cells[1]?cells[1].avail:'',
        cells[2]?cells[2].location:'', cells[2]?cells[2].avail:'',
        cells[3]?cells[3].location:'', cells[3]?cells[3].avail:'',
        gi===0 ? (c.fulfilled ? String.fromCharCode(10003) : '! -'+c.remaining) : ''
      ]);
    });
  });
  tableRows.push(['','TOTALS',totalPcs,totalPallets,'','','','','','','','','']);

  doc.autoTable({
    startY: hY + hH + 4,
    margin: { left: margin, right: margin },
    tableWidth: pageW - margin*2,
    showHead: 'everyPage',
    pageBreak: 'auto',
    rowPageBreak: 'avoid',
    head: [['SKU#','FLAVOR','PCS','PLTS','LOC 1','A1','LOC 2','A2','LOC 3','A3','LOC 4','A4','STATUS']],
    body: tableRows,
    styles: { fontSize: 9, cellPadding: 2, fontStyle:'bold' },
    headStyles: { fillColor:[40,40,40], textColor:255, fontStyle:'bold', fontSize:8 },
    columnStyles: {
      0:{cellWidth:24}, 1:{cellWidth:48},
      2:{cellWidth:13,halign:'center'}, 3:{cellWidth:13,halign:'center'},
      4:{cellWidth:24}, 5:{cellWidth:10,halign:'center'},
      6:{cellWidth:24}, 7:{cellWidth:10,halign:'center'},
      8:{cellWidth:24}, 9:{cellWidth:10,halign:'center'},
      10:{cellWidth:24},11:{cellWidth:10,halign:'center'},
      12:{cellWidth:17,halign:'center'}
    },
    didParseCell: function(data) {
      if (data.row.index === tableRows.length-1) {
        data.cell.styles.fontStyle = 'bold';
        data.cell.styles.fillColor = [240,240,240];
      }
    }
  });

  // ── FOOTER — always on its own space, new page if needed ────────────────
  const pageH = 216; // landscape letter height in mm
  const footerH = 45; // space needed for footer
  let footY = doc.lastAutoTable.finalY + 8;

  // If footer won't fit on current page, add new page
  if (footY + footerH > pageH - 8) {
    doc.addPage();
    footY = 15;
  }

  doc.setFont('helvetica','normal');
  doc.setFontSize(7); doc.setTextColor(100);
  doc.text('STAGE LOC', margin, footY);
  doc.setDrawColor(180); doc.setLineWidth(0.3);
  doc.rect(margin, footY+2, pageW-margin*2, 14);
  const verY = footY + 24;
  doc.text('VERIFIED BY', margin, verY);
  doc.line(margin, verY+7, col2-5, verY+7);
  doc.text('VER. DATE', col2+5, verY);
  doc.line(col2+5, verY+7, pageW-margin, verY+7);

  // ── OPEN IN NEW TAB FOR PRINT PREVIEW ─────────────────────────────────────
  const pdfBlob = doc.output('blob');
  const pdfUrl = URL.createObjectURL(pdfBlob);
  window.open(pdfUrl, '_blank');
}

        gi===0 ? (c.fulfilled ? String.fromCharCode(10003) : '! -'+c.remaining) : ''
      ]);
    });
  });
  tableRows.push(['','TOTALS',totalPcs,totalPallets,'','','','','','','','','']);

  doc.autoTable({
    startY: hY + hH + 4,
    margin: { left: margin, right: margin },
    tableWidth: pageW - margin*2,
    showHead: 'everyPage',
    pageBreak: 'auto',
    rowPageBreak: 'avoid',
    head: [['SKU#','FLAVOR','PCS','PLTS','LOC 1','A1','LOC 2','A2','LOC 3','A3','LOC 4','A4','STATUS']],
    body: tableRows,
    styles: { fontSize: 9, cellPadding: 2, fontStyle:'bold' },
    headStyles: { fillColor:[40,40,40], textColor:255, fontStyle:'bold', fontSize:8 },
    columnStyles: {

      3:{cellWidth:13, halign:'center'},
      4:{cellWidth:24}, 5:{cellWidth:10, halign:'center'},
      6:{cellWidth:24}, 7:{cellWidth:10, halign:'center'},
      8:{cellWidth:24}, 9:{cellWidth:10, halign:'center'},
      10:{cellWidth:24},11:{cellWidth:10, halign:'center'},
      12:{cellWidth:17, halign:'center'}
    },
    didParseCell: function(data) {
      if (data.row.index === tableRows.length-1) {
        data.cell.styles.fontStyle = 'bold';
        data.cell.styles.fillColor = [240,240,240];
      }
      // Fix status column - replace apostrophe with proper symbol
      if (data.column.index === 12 && data.cell.raw === "'") {
        data.cell.text = ['✓'];
      }
    }
  });

  // ── FOOTER ────────────────────────────────────────────────────────────────
  const footY = Math.min(doc.lastAutoTable.finalY + 10, 175);
  doc.setFont('helvetica','normal');
  doc.setFontSize(7); doc.setTextColor(100);

  doc.text('STAGE LOC', margin, footY);
  doc.setDrawColor(180);
  doc.rect(margin, footY+2, pageW-margin*2, 12);

  const verY = footY + 20;
  doc.text('VERIFIED BY', margin, verY);
  doc.line(margin, verY+8, col2-5, verY+8);
  doc.text('VER. DATE', col2+5, verY);

  if (ticket.notes) {

  }

  doc.save((ticket.orderNum||ticket.id)+'-pick-ticket.pdf');
}

// ─── CYCLE COUNT (6049) — ported from PickFlow 6021, adapted to 6049 inventory ───
function classifyRoll(r) {
  if ((r.pcsPending||0) > 0) return 'PICKED';
  const loc = (r.location||'').toUpperCase();
  const st  = (r.status||'').toUpperCase();
  if (st === 'GHOST' || loc.includes('GHOST')) return 'GHOST';
  if (st === 'DAMAGED') return 'DAMAGED';
  if (loc.includes('CYC_CNT') || loc.includes('CYC-CNT') || loc.includes('CYCLE') || st === 'CYCLE COUNT') return 'CYCLE COUNT';
  return 'AVAILABLE';
}
function inventoryAccuracyStats() {
  // Use the FULL inventory set. 6049 keeps every row (incl. cycle-count/ghost/excluded
  // locations) in rawInventory; state.inventory is the picking-filtered subset and would
  // always read 100%. This mirrors 6021, where one inventory array holds all rows.
  const inv = (state.rawInventory && state.rawInventory.length) ? state.rawInventory : (state.inventory || []);
  let ghost = 0, cc = 0;
  inv.forEach(r => { const s = classifyRoll(r); if (s==='GHOST') ghost++; else if (s==='CYCLE COUNT') cc++; });
  const total = inv.length;
  const pct = total > 0 ? (total - ghost - cc) / total * 100 : null;
  return { total, ghost, cc, off: ghost + cc, pct };
}
