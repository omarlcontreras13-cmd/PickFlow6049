function showCycleCountStart() {
  state.currentView = 'cyclecount';
  const SKIP_LOCS = ['22-TR','22-RR','22-CYCLE','22-REWORK','22-GHOST','22-GENERAL','CYC_CNT'];
  const panel = document.getElementById('main-panel');
  panel.innerHTML = '<div class="panel-inner" style="padding:20px"><div style="color:var(--text2);font-size:13px">Loading cycle count data...</div></div>';

  if (!db) {
    panel.innerHTML = '<div class="panel-inner" style="padding:20px"><div class="alert alert-warning">Not connected to database.</div></div>';
    return;
  }

  // Load ALL location sources in parallel: live sessions + custom location list + monthly archive
  Promise.all([
    db.ref('cycleCount6049').orderByChild('createdAt').once('value'),
    db.ref('locationList6049').once('value'),
    db.ref('cycleCountArchive6049').once('value')
  ]).then(([sessionSnap, locSnap, archiveSnap]) => {
    const data        = sessionSnap.val() || {};            // live (current-month) sessions
    const archiveData = archiveSnap.val() || {};            // { 'YYYY-MM': { id: session } }
    window._ccArchiveData = archiveData;
    // Flatten archived sessions and RECOMBINE with live so all coverage / last-counted / suggested
    // logic below sees the full history exactly as before (archiving only changes where rows live).
    const archivedSessions = [];
    Object.keys(archiveData).forEach(mk => Object.values(archiveData[mk]||{}).forEach(s => archivedSessions.push(s)));
    const sessions = [...Object.values(data), ...archivedSessions].sort((a,b)=>b.createdAt-a.createdAt);
    // Group every session by month for the audit panel + dropdown (in-memory; no per-month reads).
    const ccCurKey = ccMonthKey(Date.now());
    window._ccCurMonthKey = ccCurKey;
    window._ccSessionsByMonth = {};
    sessions.forEach(s => { const k=ccMonthKey(s.createdAt); (window._ccSessionsByMonth[k]=window._ccSessionsByMonth[k]||[]).push(s); });
    const ccMonthKeys = [...new Set(sessions.map(s=>ccMonthKey(s.createdAt)))];
    if (!ccMonthKeys.includes(ccCurKey)) ccMonthKeys.push(ccCurKey);
    ccMonthKeys.sort().reverse();
    const ccMonthOpts = ccMonthKeys.map(k=>`<option value="${k}"${k===ccCurKey?' selected':''}>${ccMonthLabel(k)}</option>`).join('');

    // Build full location list from all known sources
    const locSet = new Set();

    // 1. All locations ever in inventory (any status)
    state.inventory.forEach(r => { if (r.location) locSet.add(r.location); });

    // 2. All locations ever counted in any session
    sessions.forEach(s => (s.locations||[]).forEach(l => locSet.add(l)));

    // 3. Manually added persistent locations
    const customLocsObj = locSnap.val() || {};
    Object.keys(customLocsObj).forEach(l => locSet.add(l));
    window._ccCustomLocs = new Set(Object.keys(customLocsObj));

    // 4. Auto-fill gaps using the warehouse location naming pattern (e.g. 23-XX-YY)
    //    Detect prefix + max aisle + max bay from known locations, then generate full grid
    const patternRe = /^(\d+)-(\d+)-(\d+)$/;
    const prefixGroups = {};
    [...locSet].forEach(l => {
      const m = l.match(patternRe);
      if (!m) return;
      const prefix = m[1];
      const aisle  = parseInt(m[2], 10);
      const bay    = parseInt(m[3], 10);
      if (!prefixGroups[prefix]) prefixGroups[prefix] = { maxAisle:0, maxBay:{}, globalMaxBay:0 };
      const g = prefixGroups[prefix];
      if (aisle > g.maxAisle) g.maxAisle = aisle;
      if (!g.maxBay[aisle] || bay > g.maxBay[aisle]) g.maxBay[aisle] = bay;
      if (bay > g.globalMaxBay) g.globalMaxBay = bay; // track max bay across ALL aisles
    });
    // Generate every aisle/bay combo using the global max bay so no aisle is short-changed
    Object.entries(prefixGroups).forEach(([prefix, g]) => {
      for (let a = 0; a <= g.maxAisle; a++) {
        const aisleStr = String(a).padStart(2,'0');
        const maxB = g.globalMaxBay || 0;  // use global max so sparse aisles get full range
        if (maxB === 0) continue; // no bays seen for this aisle yet — skip
        for (let b = 1; b <= maxB; b++) {
          locSet.add(prefix + '-' + aisleStr + '-' + String(b).padStart(2,'0'));
        }
      }
    });

    // Cache for tracker and other views
    window._ccHistoricLocs = [...locSet];

    // Filter skip locs
    const allLocs     = [...locSet].sort();
    const storageLocs = allLocs.filter(l => !SKIP_LOCS.some(p => l.toUpperCase().includes(p.toUpperCase())));

    // Month window
    const now        = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    const monthEnd   = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59).getTime();
    const monthName  = now.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    const todayStr   = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

    // Working days remaining
    function workingDaysRemaining() {
      const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      let count = 0;
      for (let d = now.getDate(); d <= lastDay; d++) {
        const dow = new Date(now.getFullYear(), now.getMonth(), d).getDay();
        if (dow !== 0 && dow !== 6) count++;
      }
      return count;
    }
    const wdRemaining = workingDaysRemaining();

    // Suggested: all locs with put-away activity in the last 5 working days
    const _getWorkingDaysAgo = (n) => {
      const d = new Date(); d.setHours(0,0,0,0);
      let count = 0;
      while (count < n) {
        d.setDate(d.getDate() - 1);
        const day = d.getDay();
        if (day !== 0 && day !== 6) count++;
      }
      return d.getTime();
    };
    const fiveWorkingDaysAgo = _getWorkingDaysAgo(3);

        // Last counted date per location (across all sessions)
    const locLastCounted = {};
    sessions.forEach(s => {
      if (!s.createdAt) return;
      (s.locations||[]).forEach(loc => {
        if (!locLastCounted[loc] || s.createdAt > locLastCounted[loc])
          locLastCounted[loc] = s.createdAt;
      });
    });

    const locLastPutaway = {};
    state.inventory.forEach(r => {
      const loc = (r.location||'').toUpperCase();
      if (!r.location || SKIP_LOCS.some(p => loc.includes(p.toUpperCase()))) return;
      if ((r.pcsPending||0) > 0) return;
      if (r.dateRecd) {
        const t = r.dateRecd instanceof Date ? r.dateRecd.getTime() : new Date(r.dateRecd).getTime();
        if (isNaN(t) || t < fiveWorkingDaysAgo) return;
        if (!locLastPutaway[r.location] || t > locLastPutaway[r.location])
          locLastPutaway[r.location] = t;
      }
    });
    const _toMidnight = ts => { const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); };
    const suggestedLocs = Object.entries(locLastPutaway)
      .sort((a,b) => {
        const dayDiff = _toMidnight(b[1]) - _toMidnight(a[1]); // most recent date first
        if (dayDiff !== 0) return dayDiff;
        return a[0].localeCompare(b[0]);                         // same day → location A→Z
      }).slice(0,15)
      .map(([loc,ts])=>({
        loc,
        date: new Date(ts).toLocaleDateString('en-US'),
        lastCounted: locLastCounted[loc]
          ? new Date(locLastCounted[loc]).toLocaleDateString('en-US')
          : null
      }));

    const fi = 'background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:100%';

    // Month count map
    const monthCountMap = {};
    sessions.forEach(s => {
      if (!s.createdAt||s.createdAt<monthStart||s.createdAt>monthEnd) return;
      (s.locations||[]).forEach(loc=>{ monthCountMap[loc]=(monthCountMap[loc]||0)+1; });
    });
    window._ccMonthCountMap = monthCountMap;

    // Last counted date per location (across all sessions, not just this month)
        const uncountedLocs   = storageLocs.filter(l => !monthCountMap[l]);
    const countedLocsArr  = storageLocs.filter(l =>  monthCountMap[l]);
    const pct             = storageLocs.length > 0 ? Math.round(countedLocsArr.length/storageLocs.length*100) : 0;
    const pctColor        = pct>=100?'var(--accent2)':pct>=50?'var(--warning)':'var(--danger)';
    const monthSessions   = sessions.filter(s=>s.createdAt>=monthStart&&s.createdAt<=monthEnd);
    let totalLines=0, accurateLines=0, totalAdjAdd=0, totalAdjMiss=0, totalAdjExp=0;
    monthSessions.forEach(s=>{
      const adjMap = {};
      (s.adjustments||[]).forEach(a=>{ adjMap[a.loc] = a; }); // keyed by location only

      // Accuracy is per LOCATION — a location is accurate if net adj = 0
      const sessionLocs = [...new Set((s.entries||[]).filter(e=>!e.empty&&e.sku).map(e=>e.loc))];
      sessionLocs.forEach(loc=>{
        totalLines++;
        const saved = adjMap[loc];
        const add  = saved ? (saved.adjAdd||0)  : 0;
        const miss = saved ? (saved.adjMiss||0) : 0;
        if (add === 0 && miss === 0) accurateLines++; // accurate only if no adjustments at all
        totalAdjAdd  += add;
        totalAdjMiss += miss;
      });
      // Expected pallets for count accuracy
      (s.entries||[]).forEach(e=>{
        if (e.empty) return;
        totalAdjExp += (e.expectedPlt||0);
      });
    });
    const binAcc = totalLines>0 ? Math.round(accurateLines/totalLines*100) : null;
    const cntAcc = totalAdjExp>0 ? Math.max(0,Math.round((1-(totalAdjAdd+totalAdjMiss)/totalAdjExp)*100)) : null;
    const invAcc = inventoryAccuracyStats().pct;

    let html = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:18px;font-weight:bold;letter-spacing:2px">🔢 CYCLE COUNT</div>
        <div style="font-size:13px;color:var(--accent2);font-weight:bold;margin-top:4px">${todayStr}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">Goal: count all locations within <strong style="color:var(--accent)">${monthName}</strong></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="showAddLocationModal()" style="font-size:11px">+ Add Location</button>
        <button class="btn" onclick="showCCTracker()" style="font-size:11px;background:var(--surface2)">📊 Month Tracker</button>
      </div>
    </div>

    <!-- Summary cards -->
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:16px">
      ${[
        {label:'TOTAL LOCATIONS', val:storageLocs.length, color:'var(--text)'},
        {label:'COUNTED', val:countedLocsArr.length, color:'var(--accent2)'},
        {label:'NOT COUNTED', val:uncountedLocs.length, color:uncountedLocs.length>0?'var(--danger)':'var(--accent2)'},
        {label:'SESSIONS', val:monthSessions.length, color:'var(--accent)'},
        {label:'INV ACCURACY', val:invAcc!==null?invAcc.toFixed(1)+'%':'—', color:invAcc===null?'var(--text2)':invAcc>=98?'var(--accent2)':invAcc>=95?'var(--warning)':'var(--danger)'},
        {label:'BIN ACCURACY', val:binAcc!==null?binAcc+'%':'—', color:binAcc===null?'var(--text2)':binAcc>=100?'var(--accent2)':binAcc>=95?'var(--warning)':'var(--danger)'},
        {label:'COUNT ACCURACY', val:cntAcc!==null?cntAcc+'%':'—', color:cntAcc===null?'var(--text2)':cntAcc>=100?'var(--accent2)':cntAcc>=90?'var(--warning)':'var(--danger)'},
        {label:'WORK DAYS LEFT', val:wdRemaining, color:wdRemaining<=3?'var(--danger)':wdRemaining<=7?'var(--warning)':'var(--accent2)'}
      ].map(c=>`
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:9px;color:${c.color};letter-spacing:1px;margin-bottom:4px;font-weight:bold">${c.label}</div>
          <div style="font-size:20px;font-weight:bold;color:${c.color}">${c.val}</div>
        </div>`).join('')}
    </div>

    <!-- Main 3-col grid -->
    <div style="display:grid;grid-template-columns:200px 1fr 300px;gap:14px;align-items:start">

      <!-- Suggested -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px">
        <div style="font-size:10px;font-weight:bold;color:var(--warning);letter-spacing:1px;margin-bottom:8px">⚡ SUGGESTED</div>
        <div style="font-size:9px;color:var(--text2);margin-bottom:10px;line-height:1.4">Most recently put-away locations</div>`;

    if (!suggestedLocs.length) {
      html += `<div style="font-size:11px;color:var(--text2);text-align:center;padding:12px">No recent put-away data</div>`;
    } else {
      suggestedLocs.forEach(({loc, date, lastCounted}) => {
        const isCounted = monthCountMap[loc] > 0;
        html += `<div onclick="ediSuggestSelect('${loc}')" title="Click to pre-select" style="display:flex;align-items:center;gap:6px;padding:5px 6px;margin-bottom:2px;border-radius:5px;cursor:pointer;border:1px solid var(--border);background:${isCounted?'rgba(26,158,122,0.07)':'rgba(224,62,62,0.07)'}"
          onmouseover="this.style.background='rgba(79,110,247,0.1)'" onmouseout="this.style.background='${isCounted?'rgba(26,158,122,0.07)':'rgba(224,62,62,0.07)'}'">
          <span style="width:8px;height:8px;border-radius:50%;background:${isCounted?'var(--accent2)':'var(--danger)'};display:inline-block;flex-shrink:0"></span>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:bold;color:var(--accent)">${loc}</div>
            <div style="font-size:9px;color:var(--text2)">Put away: ${date}</div>
            <div style="font-size:9px;color:${lastCounted?'var(--accent2)':'var(--danger)'}">Counted: ${lastCounted||'Never'}</div>
          </div>
        </div>`;
      });
    }

    html += `</div>

      <!-- Location selector -->
      <div>
        <div style="font-size:11px;color:var(--text2);letter-spacing:1px;margin-bottom:10px;font-weight:bold">
          SELECT LOCATIONS TO COUNT
          <span style="font-size:10px;font-weight:normal;margin-left:8px">${storageLocs.length} total locations (${uncountedLocs.length} not yet counted)</span>
        </div>
        <div class="form-group" style="margin-bottom:10px">
          <input type="text" id="cc-loc-search" placeholder="Filter locations..." oninput="filterCCLocs()" style="${fi}">
        </div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <button class="btn btn-sm" onclick="document.querySelectorAll('.cc-loc-chk').forEach(c=>c.checked=true);updateCCSelCount()">Select All</button>
          <button class="btn btn-sm" onclick="document.querySelectorAll('.cc-loc-chk').forEach(c=>c.checked=false);updateCCSelCount()">Clear All</button>
          <button class="btn btn-sm" onclick="selectUncountedOnly()" style="background:rgba(224,62,62,0.1);color:var(--danger);border-color:var(--danger)">Select Uncounted Only</button>
          <span id="cc-sel-count" style="font-size:12px;color:var(--text2);padding:5px 8px">0 selected</span>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-weight:bold;color:var(--text);font-size:12px">${monthName} Progress</span>
            <span style="font-weight:bold;color:${pctColor};font-size:12px">${countedLocsArr.length} / ${storageLocs.length} &nbsp; ${pct}%
              <span style="font-size:10px;color:${wdRemaining<=3?'var(--danger)':'var(--text2)'}"> &nbsp;(${wdRemaining} work days left)</span>
            </span>
          </div>
          <div style="background:var(--border);border-radius:4px;height:8px;overflow:hidden">
            <div style="width:${pct}%;background:${pctColor};height:100%;border-radius:4px;transition:width 0.4s"></div>
          </div>
          ${(()=>{
            const remaining = storageLocs.length - countedLocsArr.length;
            if (remaining <= 0) return '<div style="font-size:11px;color:var(--accent2);margin-top:6px;font-weight:bold">✓ All locations counted this month!</div>';
            const perDay = wdRemaining > 0 ? Math.ceil(remaining / wdRemaining) : remaining;
            const urgColor = perDay >= 20 ? 'var(--danger)' : perDay >= 10 ? 'var(--warning)' : 'var(--accent2)';
            return '<div style="font-size:11px;color:var(--text2);margin-top:6px">'
              + '<span style="color:var(--text2)">To finish on time: </span>'
              + '<span style="font-weight:bold;color:'+urgColor+'">'+perDay+' location'+(perDay===1?'':'s')+' / day</span>'
              + '<span style="color:var(--text2)"> &nbsp;('+remaining+' remaining ÷ '+wdRemaining+' work day'+(wdRemaining===1?'':'s')+')</span>'
              + '</div>';
          })()}
        </div>
        <div class="cc-loc-list" id="cc-loc-list" style="max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:6px">`;

    if (!storageLocs.length) {
      html += '<div style="text-align:center;color:var(--text2);padding:20px;font-size:13px">No locations found. Import inventory first.</div>';
    } else {
      storageLocs.forEach(l => {
        const avail   = state.inventory.filter(r=>r.location===l&&(r.pcsPending||0)===0).length;
        const picked  = state.inventory.filter(r=>r.location===l&&(r.pcsPending||0)>0).length;
        const mc      = monthCountMap[l]||0;
        const isSugg  = suggestedLocs.some(s=>s.loc===l);
        const isCustom= window._ccCustomLocs && window._ccCustomLocs.has(l);
        const isEmpty = avail===0 && picked===0;
        const badge   = mc>0
          ? `<span style="background:rgba(26,158,122,0.15);color:var(--accent2);border-radius:10px;padding:1px 8px;font-size:11px;font-weight:bold">✓ ${mc}x</span>`
          : `<span style="background:rgba(224,62,62,0.1);color:var(--danger);border-radius:10px;padding:1px 8px;font-size:11px">Not counted</span>`;
        const suggBorder = isSugg ? 'border-left:3px solid var(--warning);' : '';
        html += `<label class="cc-loc-item" data-counted="${mc>0}" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);${suggBorder}" onmouseover="this.style.background='rgba(79,110,247,0.07)'" onmouseout="this.style.background=''">
          <input type="checkbox" class="cc-loc-chk" value="${l}" onchange="updateCCSelCount()" style="cursor:pointer;width:16px;height:16px">
          <span style="font-weight:bold;color:var(--accent);min-width:90px">${l}</span>
          ${isSugg?`<span style="font-size:9px;color:var(--warning);font-weight:bold">⚡</span>`:''}
          ${isCustom?`<span style="font-size:9px;color:var(--accent);background:rgba(79,110,247,0.12);border-radius:4px;padding:1px 5px">custom</span>`:''}
          ${isEmpty
            ? `<span style="color:var(--text2);font-size:12px;font-style:italic">Empty</span>`
            : `<span style="color:var(--accent2);font-size:12px">${avail} avail</span>`}
          ${picked?`<span style="color:var(--warning);font-size:12px">${picked} picked</span>`:''}
          <span style="margin-left:auto">${badge}</span>
          ${isCustom&&isAdmin()?`<button onclick="event.preventDefault();removeCustomLocation('${l}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px;padding:0 4px;margin-left:4px" title="Remove location">✕</button>`:''}
        </label>`;
      });
    }

    html += `</div>
        <button class="btn btn-primary" style="width:100%;margin-top:12px;font-size:14px;padding:12px" onclick="startCycleCount()">Start Count →</button>
      </div>

      <!-- Monthly counts (audit) -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px">
          <div style="font-size:11px;color:var(--text2);letter-spacing:1px;font-weight:bold">COUNTS — <span id="cc-month-label"></span></div>
          <select id="cc-month-select" onchange="loadCCMonth(this.value)" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-family:var(--font);font-size:11px;outline:none">${ccMonthOpts}</select>
        </div>
        <div id="cc-month-list">`;

    html += `</div></div></div>`;

    panel.innerHTML = '<div class="panel-inner" style="padding:20px">' + html + '</div>';
    window._ccAllLocs = storageLocs;
    window._ccSuggestedLocs = suggestedLocs.map(s=>s.loc);
    renderCCMonthList(ccCurKey);
    // Physically move any prior-month live sessions into the monthly archive node.
    // Safe ordering: write archive copies first, confirm, THEN remove from live (worst case = a
    // harmless duplicate, never data loss). cycleCount6049 then holds the current month only.
    const ccPrior = Object.values(data).filter(s => ccMonthKey(s.createdAt) !== ccCurKey);
    if (ccPrior.length) {
      const upd = {}; ccPrior.forEach(s => upd['cycleCountArchive6049/'+ccMonthKey(s.createdAt)+'/'+s.id] = s);
      db.ref().update(upd)
        .then(() => { const rem = {}; ccPrior.forEach(s => rem['cycleCount6049/'+s.id] = null); return db.ref().update(rem); })
        .catch(()=>{});
    }
  });
}

// Show modal to pick which uncounted locations to select
function selectUncountedOnly() {
  const mm       = window._ccMonthCountMap || {};
  const allLocs  = window._ccAllLocs || [];
  const uncounted = allLocs.filter(l => !mm[l]);

  if (!uncounted.length) { showAlert('All locations have been counted this month!', 'success'); return; }

  // Build inventory summary per location
  const invByLoc = {};
  (state.inventory||[]).forEach(r => {
    if (!r.location) return;
    if (!invByLoc[r.location]) invByLoc[r.location] = {avail:0, picked:0};
    if ((r.pcsPending||0)>0) invByLoc[r.location].picked++;
    else invByLoc[r.location].avail++;
  });

  const fi = 'background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;width:100%;box-sizing:border-box';

  let rows = uncounted.map((loc, i) => {
    const inv  = invByLoc[loc] || {avail:0, picked:0};
    const desc = inv.avail ? `${inv.avail} avail` : inv.picked ? `${inv.picked} picked` : 'Empty';
    const descColor = inv.avail ? 'var(--accent2)' : inv.picked ? 'var(--warning)' : 'var(--text2)';
    return `<label style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px;"
      onmouseover="this.style.background='rgba(79,110,247,0.06)'" onmouseout="this.style.background=''">
      <input type="checkbox" class="unc-loc-chk" value="${loc}" checked style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent)">
      <span style="font-weight:bold;color:var(--accent);min-width:90px">${loc}</span>
      <span style="font-size:11px;color:${descColor}">${desc}</span>
    </label>`;
  }).join('');

  let h = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="width:480px;max-height:80vh;display:flex;flex-direction:column">
      <h2 style="margin-bottom:4px">Select Uncounted Locations</h2>
      <p style="font-size:11px;color:var(--text2);margin-bottom:12px">${uncounted.length} locations not yet counted this month</p>
      <div style="margin-bottom:10px">
        <input type="text" placeholder="Filter..." oninput="filterUncountedModal(this.value)" style="${fi}">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button class="btn btn-sm" onclick="document.querySelectorAll('.unc-loc-chk').forEach(c=>c.checked=true)">☑ All</button>
        <button class="btn btn-sm" onclick="document.querySelectorAll('.unc-loc-chk').forEach(c=>c.checked=false)">☐ None</button>
        <span id="unc-sel-count" style="font-size:11px;color:var(--text2);padding:5px">${uncounted.length} selected</span>
      </div>
      <div id="unc-loc-list" style="flex:1;overflow-y:auto;border:1px solid var(--border);border-radius:6px;max-height:380px">
        ${rows}
      </div>
      <div class="modal-actions" style="margin-top:14px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="applyUncountedSelection()">Apply Selection</button>
      </div>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', h);
  // Update count as user checks/unchecks
  document.querySelectorAll('.unc-loc-chk').forEach(c => {
    c.addEventListener('change', () => {
      const sel = document.querySelectorAll('.unc-loc-chk:checked').length;
      const el = document.getElementById('unc-sel-count');
      if (el) el.textContent = sel + ' selected';
    });
  });
}

function filterUncountedModal(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('#unc-loc-list label').forEach(label => {
    const loc = label.querySelector('.unc-loc-chk')?.value || '';
    label.style.display = loc.toLowerCase().includes(q) ? '' : 'none';
  });
}

function applyUncountedSelection() {
  const selected = new Set(
    [...document.querySelectorAll('.unc-loc-chk:checked')].map(c => c.value)
  );
  // Uncheck everything in the main list first, then check selected uncounted ones
  document.querySelectorAll('.cc-loc-chk').forEach(c => {
    if (selected.has(c.value)) c.checked = true;
    // leave already-checked ones alone if not in uncounted set
  });
  updateCCSelCount();
  closeModal();
}


// Add a custom persistent location
function showAddLocationModal() {
  const fi = 'width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;box-sizing:border-box;margin-top:6px';
  let h  = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
  h += '<div class="modal" style="width:380px">';
  h += '<h2 style="margin-bottom:12px">➕ Add Location</h2>';
  h += '<p style="font-size:12px;color:var(--text2);margin-bottom:14px">Add a location that should always appear in the cycle count list, even when empty.</p>';
  h += `<label style="font-size:12px;font-weight:bold">Location Name</label>
        <input id="new-loc-input" type="text" placeholder="e.g. 23-04-15" style="${fi}" onkeydown="if(event.key==='Enter')saveCustomLocation()">`;
  h += '<div class="modal-actions" style="margin-top:16px">';
  h += '<button class="btn" onclick="closeModal()">Cancel</button>';
  h += '<button class="btn btn-primary" onclick="saveCustomLocation()">Add Location</button>';
  h += '</div></div></div>';
  document.body.insertAdjacentHTML('beforeend', h);
  setTimeout(()=>document.getElementById('new-loc-input')?.focus(), 50);
}

function saveCustomLocation() {
  const val = (document.getElementById('new-loc-input')?.value||'').trim().toUpperCase();
  if (!val) { showAlert('Please enter a location name.','warning'); return; }
  if (!db)  { showAlert('Not connected.','warning'); return; }
  db.ref('locationList6049/' + val.replace(/[.#$[\]]/g,'-')).set(true)
    .then(() => {
      closeModal();
      showAlert('Location ' + val + ' added.', 'success');
      showCycleCountStart();
    })
    .catch(err => showAlert('Error: '+err.message,'danger'));
}

function removeCustomLocation(loc) {
  if (!db) return;
  const key = loc.replace(/[.#$[\]]/g,'-');
  db.ref('locationList6049/'+key).remove()
    .then(() => { showAlert('Location '+loc+' removed.','success'); showCycleCountStart(); })
    .catch(err => showAlert('Error: '+err.message,'danger'));
}



// Click a suggested location to pre-check it in the main list
function ediSuggestSelect(loc) {
  const chks = document.querySelectorAll('.cc-loc-chk');
  chks.forEach(c => { if (c.value === loc) c.checked = true; });
  updateCCSelCount();
  // Scroll the location into view
  const item = [...document.querySelectorAll('.cc-loc-item')].find(el => {
    const chk = el.querySelector('.cc-loc-chk');
    return chk && chk.value === loc;
  });
  if (item) item.scrollIntoView({behavior:'smooth', block:'nearest'});
}


function showCCTracker() {
  state.currentView = 'cctracker';
  const panel = document.getElementById('main-panel');
  panel.innerHTML = '<div class="panel-inner" style="padding:20px"><div style="color:var(--text2)">Loading tracker...</div></div>';

  const SKIP_LOCS = ['22-TR','22-RR','22-CYCLE','22-REWORK','22-GHOST','22-GENERAL','CYC_CNT'];
  // All locations: inventory (ever seen) + session history + custom — no capacity ref needed
  const locSet2 = new Set(window._ccHistoricLocs || []);
  state.inventory.forEach(r => { if (r.location) locSet2.add(r.location); });
  const allLocs     = [...locSet2].sort();
  const storageLocs = allLocs.filter(l => !SKIP_LOCS.some(p=>l.toUpperCase().includes(p.toUpperCase())));

  const now = new Date();
  const year  = now.getFullYear();
  const month = now.getMonth();
  const monthName = now.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const monthStart = new Date(year, month, 1).getTime();
  const monthEnd   = new Date(year, month+1, 0, 23,59,59).getTime();
  const lastDay    = new Date(year, month+1, 0).getDate();
  const today      = now.getDate();

  // Working days in month & remaining
  function isWorkday(y, m, d) {
    const dow = new Date(y, m, d).getDay();
    return dow !== 0 && dow !== 6;
  }
  let totalWorkDays = 0, remainWorkDays = 0;
  for (let d = 1; d <= lastDay; d++) {
    if (isWorkday(year, month, d)) {
      totalWorkDays++;
      if (d >= today) remainWorkDays++;
    }
  }
  const passedWorkDays = totalWorkDays - remainWorkDays;

  if (!db) { panel.innerHTML = '<div class="panel-inner" style="padding:20px"><div class="alert alert-warning">Not connected to database.</div></div>'; return; }

  db.ref('cycleCount6049').orderByChild('createdAt').once('value', snap => {
    const data = snap.val() || {};
    const sessions = Object.values(data).filter(s=>s.createdAt>=monthStart&&s.createdAt<=monthEnd).sort((a,b)=>a.createdAt-b.createdAt);

    // Build per-location count map: loc → array of dates counted
    const locDates = {};
    sessions.forEach(s => {
      const d = new Date(s.createdAt).getDate();
      (s.locations||[]).forEach(loc => {
        if (!locDates[loc]) locDates[loc] = new Set();
        locDates[loc].add(d);
      });
    });

    const countedLocs   = storageLocs.filter(l => locDates[l]?.size > 0);
    const uncountedLocs = storageLocs.filter(l => !locDates[l]?.size);
    const pct = storageLocs.length > 0 ? Math.round(countedLocs.length/storageLocs.length*100) : 0;
    const pctColor = pct>=100?'var(--accent2)':pct>=50?'var(--warning)':'var(--danger)';
    const wdColor  = remainWorkDays<=3?'var(--danger)':remainWorkDays<=7?'var(--warning)':'var(--accent2)';
    const invAcc   = inventoryAccuracyStats().pct;
    const invAccColor = invAcc===null?'var(--text2)':invAcc>=98?'var(--accent2)':invAcc>=95?'var(--warning)':'var(--danger)';

    // Build calendar day headers
    const calDays = [];
    for (let d = 1; d <= lastDay; d++) calDays.push(d);
    const workdays = calDays.filter(d => isWorkday(year, month, d));

    let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:14px;font-weight:bold;letter-spacing:2px">📊 CYCLE COUNT TRACKER — ${monthName.toUpperCase()}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px">All locations must be counted at least once this month</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="exportCCTrackerReport()" style="font-size:11px;background:var(--accent);color:#fff;border-color:var(--accent)">🖨 Print Report</button>
        <button class="btn" onclick="showCycleCountStart()" style="font-size:11px">← Back to Count</button>
      </div>
    </div>

    <!-- Summary bar -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px">
      ${[
        {l:'TOTAL LOCATIONS', v:storageLocs.length, c:'var(--text)'},
        {l:'COUNTED', v:countedLocs.length, c:'var(--accent2)'},
        {l:'REMAINING', v:uncountedLocs.length, c:uncountedLocs.length>0?'var(--danger)':'var(--accent2)'},
        {l:'% COMPLETE', v:pct+'%', c:pctColor},
        {l:'INV ACCURACY', v:invAcc!==null?invAcc.toFixed(1)+'%':'—', c:invAccColor},
        {l:'WORK DAYS DONE', v:passedWorkDays+'/'+totalWorkDays, c:'var(--text2)'},
        {l:'WORK DAYS LEFT', v:remainWorkDays, c:wdColor}
      ].map(x=>`
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:9px;color:${x.c};letter-spacing:1px;font-weight:bold;margin-bottom:4px">${x.l}</div>
          <div style="font-size:20px;font-weight:bold;color:${x.c}">${x.v}</div>
        </div>`).join('')}
    </div>

    <!-- Progress bar -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-weight:bold;font-size:13px">${monthName} Progress</span>
        <span style="font-size:12px;color:var(--text2)">
          ${remainWorkDays} working day${remainWorkDays!==1?'s':''} remaining to count <strong style="color:${wdColor}">${uncountedLocs.length}</strong> location${uncountedLocs.length!==1?'s':''}
        </span>
      </div>
      <div style="background:var(--border);border-radius:4px;height:10px;overflow:hidden">
        <div style="width:${pct}%;background:${pctColor};height:100%;border-radius:4px;transition:width 0.4s"></div>
      </div>
    </div>

    <!-- Two-column: Not Counted | Counted ─────────────────────────────── -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">

      <!-- NOT COUNTED -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:11px;font-weight:bold;color:var(--danger);letter-spacing:1px">❌ NOT YET COUNTED (${uncountedLocs.length})</div>
        </div>
        ${uncountedLocs.length === 0
          ? `<div style="text-align:center;padding:20px;color:var(--accent2);font-size:13px;font-weight:bold">🎉 All locations counted!</div>`
          : `<div style="max-height:400px;overflow-y:auto">
          ${uncountedLocs.map((loc,i)=>{
            const inv = state.inventory.filter(r=>r.location===loc);
            const pallets = inv.filter(r=>(r.pcsPending||0)===0).length;
            return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;margin-bottom:3px;background:${i%2!==0?'var(--surface2)':'rgba(224,62,62,0.05)'}">
              <span style="font-weight:bold;color:var(--accent);font-size:12px">${loc}</span>
              <span style="font-size:11px;color:var(--text2)">${pallets?pallets+' pallets':'Empty'}</span>
            </div>`;
          }).join('')}
          </div>`
        }
      </div>

      <!-- COUNTED -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px">
        <div style="font-size:11px;font-weight:bold;color:var(--accent2);letter-spacing:1px;margin-bottom:10px">✅ COUNTED (${countedLocs.length})</div>
        ${countedLocs.length === 0
          ? `<div style="text-align:center;padding:20px;color:var(--text2);font-size:12px">No locations counted yet this month.</div>`
          : `<div style="max-height:400px;overflow-y:auto">
          ${countedLocs.map((loc,i)=>{
            const days = [...(locDates[loc]||[])].sort((a,b)=>a-b);
            const countStr = days.length>1?`${days.length}x (days ${days.join(', ')})`:(`day ${days[0]}`);
            return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;margin-bottom:3px;background:${i%2!==0?'var(--surface2)':'rgba(26,158,122,0.05)'}">
              <span style="font-weight:bold;color:var(--accent);font-size:12px">${loc}</span>
              <span style="font-size:10px;color:var(--accent2)">${countStr}</span>
            </div>`;
          }).join('')}
          </div>`
        }
      </div>
    </div>`;

    // Cache what the printable report needs
    window._ccTrackerReport = {
      monthName,
      generatedAt: Date.now(),
      totalLocs: storageLocs.length,
      countedLocs: countedLocs.slice(),
      uncountedLocs: uncountedLocs.slice(),
      pct,
      invAcc,
      passedWorkDays, totalWorkDays, remainWorkDays,
      sessions
    };

    panel.innerHTML = '<div class="panel-inner" style="padding:20px">' + html + '</div>';
  });
}

// Build a print-preview report (count results + % totals) from the tracker data.
function exportCCTrackerReport() {
  const T = window._ccTrackerReport;
  if (!T) { showAlert('Open the Cycle Count Tracker first.','warning'); return; }

  const pctTxt = n => (isFinite(n) ? Math.round(n) : 0) + '%';

  // Per-session results (accuracy + variance), mirroring the report screen's math.
  let aggLines = 0, aggAccurate = 0, aggExp = 0, aggAdj = 0, aggNet = 0, aggLocs = 0;
  const sessionRows = (T.sessions || []).map(s => {
    const adjs   = s.adjustments || [];
    const getAdj = loc => adjs.find(a => a.loc === loc);
    const entries = s.entries || [];
    let exp = 0, adjTot = 0, net = 0;
    entries.forEach(e => {
      const a = getAdj(e.loc);
      const add = a ? (a.adjAdd||0) : 0, miss = a ? (a.adjMiss||0) : 0;
      exp    += e.expectedPlt || 0;
      adjTot += add + miss;
      net    += add - miss;
    });
    const nonEmpty = [...new Set(entries.filter(e => !e.empty && e.sku).map(e => e.loc))];
    const accurate = nonEmpty.filter(loc => {
      const a = getAdj(loc);
      return !a || ((a.adjAdd||0) === 0 && (a.adjMiss||0) === 0);
    }).length;
    const binPct   = nonEmpty.length > 0 ? (accurate / nonEmpty.length * 100) : 100;
    const countPct = exp > 0 ? Math.max(0, (1 - adjTot/exp) * 100) : 100;
    const locs     = (s.locations || []).length;
    aggLines += nonEmpty.length; aggAccurate += accurate;
    aggExp += exp; aggAdj += adjTot; aggNet += net; aggLocs += locs;
    return {
      id: s.id, date: new Date(s.createdAt).toLocaleDateString('en-US'),
      by: s.counterName || s.countedBy || '', locs, binPct, countPct, net,
      adjusted: (s.adjustments && s.adjustments.length) ? 'Yes' : '—'
    };
  });
  const aggBin   = aggLines > 0 ? (aggAccurate / aggLines * 100) : 100;
  const aggCount = aggExp   > 0 ? Math.max(0, (1 - aggAdj/aggExp) * 100) : 100;

  const cards = [
    ['Total Locations', T.totalLocs],
    ['Counted', T.countedLocs.length],
    ['Remaining', T.uncountedLocs.length],
    ['% Complete', T.pct + '%'],
    ['Count Accuracy', pctTxt(aggCount)],
    ['Bin Accuracy', pctTxt(aggBin)],
    ['Inventory Accuracy', (T.invAcc!=null ? T.invAcc.toFixed(1)+'%' : '—'), 'flex:0 0 auto;margin-left:auto;margin-right:auto;min-width:200px;text-align:center']
  ].map(c => '<div class="card" style="'+(c[2]||'')+'"><div class="lbl">'+c[0]+'</div><div class="val">'+c[1]+'</div></div>').join('');

  const sessionTable = sessionRows.length
    ? `<table>
        <thead><tr>
          <th>Session</th><th>Date</th><th>Counter</th>
          <th class="num">Locations</th><th class="num">Bin Acc.</th>
          <th class="num">Count Acc.</th><th class="num">Net Var.</th><th>Adjusted</th>
        </tr></thead>
        <tbody>
          ${sessionRows.map(r => `<tr>
            <td>${r.id}</td><td>${r.date}</td><td>${r.by}</td>
            <td class="num">${r.locs}</td>
            <td class="num">${pctTxt(r.binPct)}</td>
            <td class="num">${pctTxt(r.countPct)}</td>
            <td class="num">${r.net>=0?'+':''}${r.net}</td>
            <td>${r.adjusted}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="3">TOTALS — ${sessionRows.length} session${sessionRows.length!==1?'s':''}</td>
          <td class="num">${aggLocs}</td>
          <td class="num">${pctTxt(aggBin)}</td>
          <td class="num">${pctTxt(aggCount)}</td>
          <td class="num">${aggNet>=0?'+':''}${aggNet}</td>
          <td></td>
        </tr></tfoot>
      </table>`
    : '<div class="muted" style="padding:10px 0">No cycle counts recorded this month.</div>';

  const uncountedList = T.uncountedLocs.length
    ? '<div class="loclist">' + T.uncountedLocs.map(l => '<span>'+l+'</span>').join('') + '</div>'
    : '<div class="muted" style="padding:10px 0">All locations have been counted. ✔</div>';

  const doc = `<!doctype html><html><head><meta charset="utf-8">
    <title>Cycle Count Report — ${T.monthName}</title>
    <style>
      *{font-family:Arial,Helvetica,sans-serif;box-sizing:border-box}
      body{margin:24px;color:#111}
      h1{font-size:20px;margin:0 0 2px}
      h2{font-size:14px;margin:18px 0 6px;border-bottom:2px solid #222;padding-bottom:3px}
      .sub{color:#555;font-size:12px;margin-bottom:16px}
      .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
      .card{border:1px solid #bbb;border-radius:6px;padding:8px 14px;min-width:120px;flex:1}
      .card .lbl{font-size:10px;color:#666;letter-spacing:1px;text-transform:uppercase}
      .card .val{font-size:22px;font-weight:bold;margin-top:2px}
      table{width:100%;border-collapse:collapse;margin:8px 0 18px;font-size:12px}
      th,td{border:1px solid #ccc;padding:6px 8px;text-align:left}
      th{background:#eee}
      td.num,th.num{text-align:right}
      tfoot td{font-weight:bold;background:#f6f6f6}
      .muted{color:#777}
      .loclist{display:flex;flex-wrap:wrap;gap:4px}
      .loclist span{border:1px solid #ddd;border-radius:4px;padding:2px 7px;font-size:11px}
      .bar{height:12px;background:#e5e5e5;border-radius:6px;overflow:hidden;margin:6px 0 16px}
      .bar > div{height:100%;background:#1a9e7a;width:${T.pct}%}
      .toolbar{margin-bottom:14px}
      .toolbar button{font:bold 12px Arial;padding:7px 16px;border:none;border-radius:6px;background:#1a9e7a;color:#fff;cursor:pointer}
      @media print{.noprint{display:none}body{margin:.5in}}
    </style></head><body>
    <div class="toolbar noprint"><button onclick="window.print()">🖨 Print</button></div>
    <h1>PickFlow 6021 — Cycle Count Report</h1>
    <div class="sub">Greensboro · ${T.monthName} · Generated ${new Date(T.generatedAt).toLocaleString()}</div>
    <div class="cards">${cards}</div>
    <div class="bar"><div></div></div>
    <div class="sub">${T.passedWorkDays}/${T.totalWorkDays} work days elapsed · ${T.remainWorkDays} remaining</div>
    <h2>Count Sessions</h2>
    ${sessionTable}
    <h2>Not Yet Counted (${T.uncountedLocs.length})</h2>
    ${uncountedList}
    </body></html>`;

  const w = window.open('', '_blank');
  if (!w) { showAlert('Allow pop-ups for this site to print the report.','warning'); return; }
  w.document.open();
  w.document.write(doc);
  w.document.close();
  w.focus();
  setTimeout(() => { try { w.print(); } catch(e){} }, 350);
}

function startCycleCount() {
  const selected = [...document.querySelectorAll('.cc-loc-chk:checked')].map(c=>c.value);
  if (!selected.length) { showAlert('Select at least one location.','warning'); return; }

  // Build per-location skid detail (excluding picked)
  const locData = {};
  selected.forEach(loc => { locData[loc] = []; });
  state.inventory.forEach(r => {
    if (!selected.includes(r.location)) return;
    if ((r.pcsPending||0) > 0) return;
    locData[r.location].push(r);
  });

  // Build entries grouped by loc+sku
  const entries = [];
  selected.forEach(loc => {
    const rows = locData[loc].sort((a,b)=>(a.sku||'').localeCompare(b.sku||''));
    const skuGroups = {};
    rows.forEach(r=>{ if(!skuGroups[r.sku]) skuGroups[r.sku]={sku:r.sku,rows:[],totalPcs:0,totalPlt:0}; skuGroups[r.sku].rows.push(r); skuGroups[r.sku].totalPcs+=r.pcs||0; skuGroups[r.sku].totalPlt++; });
    if (Object.keys(skuGroups).length===0) {
      entries.push({ loc, sku:'', expectedPcs:0, expectedPlt:0, rows:[], empty:true });
    } else {
      Object.values(skuGroups).forEach(sg => entries.push({ loc, sku:sg.sku, expectedPcs:sg.totalPcs, expectedPlt:sg.totalPlt, rows:sg.rows, empty:false }));
    }
  });

  window._ccEntries = entries;
  window._ccLocations = selected;
  window._ccLocData = locData;

  // Show count sheet preview — no input needed, just confirm and save
  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div style="font-size:13px;font-weight:bold;letter-spacing:2px">🔢 COUNT SHEET PREVIEW</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-sm" onclick="showCycleCountStart()">← Back</button>
      <button class="btn btn-sm" onclick="printCCCurrentSheet()" style="background:var(--accent2);color:#fff">🖨 Print Preview</button>
      <button class="btn btn-primary btn-sm" onclick="saveCycleCount()">💾 Save Count</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;background:var(--surface);border:1px solid var(--accent);border-radius:8px;padding:10px 14px">
    <label style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--accent);text-transform:uppercase;white-space:nowrap">Counter Name</label>
    <input id="cc-counter-name" type="text" placeholder="Who is physically counting?" value="${(window._ccCounterName||'').replace(/"/g,'&quot;')}"
      style="flex:1;min-width:180px;padding:7px 12px;border:1.5px solid var(--accent);border-radius:7px;font-family:var(--font);font-size:13px;font-weight:700;background:var(--surface);color:var(--text);outline:none">
    <span style="font-size:10px;color:var(--text2)">The person performing the physical count — not the creator.</span>
  </div>
  <div class="alert alert-info" style="margin-bottom:12px">
    Review the count sheet below. Click <strong>Save &amp; Export</strong> to save this session and download the Word document to take to the floor. You can re-open this session later to enter adjustments after the physical count.
  </div>`;

  selected.forEach(loc => {
    const locEntries = entries.filter(e=>e.loc===loc);
    const locPlt = locEntries.reduce((s,e)=>s+(e.expectedPlt||0),0);
    const locPcs = locEntries.reduce((s,e)=>s+(e.expectedPcs||0),0);

    html += `<div style="margin-bottom:20px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <div style="background:var(--surface);padding:8px 14px;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;font-weight:bold;color:var(--accent)">📍 ${loc}</span>
        <span style="font-size:11px;color:var(--text2);margin-left:16px">${locPlt} pallets &nbsp;·&nbsp; ${locPcs.toLocaleString()} pcs</span>
      </div>
      <div style="overflow-x:auto">
      <table class="sku-table" style="font-size:11px;margin:0"><thead><tr>
        <th>SKU</th><th>CUSTOMER</th><th>PRODUCT ID</th><th>LOT #</th><th>SKID ID</th><th>PO #</th>
        <th style="text-align:center">PALLETS</th><th style="text-align:right">PCS</th><th>COUNT NOTES</th>
      </tr></thead><tbody>`;

    if (locEntries.length===0 || locEntries[0].empty) {
      html += '<tr><td colspan="8" style="text-align:center;color:var(--text2);font-style:italic;padding:10px">No available inventory</td></tr>';
    } else {
      locEntries.forEach(e => {
        (e.rows||[]).forEach(r => {
          html += `<tr>
            <td style="color:var(--accent);font-weight:bold">${r.sku||''}</td>
            <td style="font-size:10px;color:var(--accent2)">${r.customer||''}</td>
            <td style="font-size:10px;color:var(--text2)">${(r.productId||state.skuNames[r.sku]||r.sku)||''}</td>
            <td style="font-size:10px">${r.lot||''}</td>
            <td style="font-size:10px">${r.skid||''}</td>
            <td style="font-size:10px">${r.po||''}</td>
            <td style="text-align:center">1</td>
            <td style="text-align:right">${(r.pcs||0).toLocaleString()}</td>
            <td style="color:var(--text2);font-size:10px">___________________</td>
          </tr>`;
        });
        html += `<tr style="background:var(--surface);font-weight:bold">
          <td colspan="5" style="color:var(--text2);font-size:10px">${e.sku} Total</td><td></td>
          <td style="text-align:center;color:var(--accent2)">${e.expectedPlt}</td>
          <td style="text-align:right;color:var(--accent2)">${e.expectedPcs.toLocaleString()}</td><td></td>
        </tr>`;
      });
    }
    html += `<tr style="background:var(--surface2);font-weight:bold">
      <td colspan="6">Grand Total</td>
      <td style="text-align:center;color:var(--accent)">${locPlt}</td>
      <td style="text-align:right;color:var(--accent)">${locPcs.toLocaleString()}</td><td></td>
    </tr>`;
    html += '</tbody></table></div></div>';
  });

  document.getElementById('main-panel').innerHTML = html;
}

function viewCCSession(id) {
  if (!db) return;
  db.ref('cycleCount6049/'+id).once('value', snap=>{
    const s = snap.val();
    if (s) { showCCReport(s); return; }
    // Archived session — look it up in the loaded monthly-archive cache (read-only).
    const arch = window._ccArchiveData || {};
    for (const mk in arch) { if (arch[mk] && arch[mk][id]) { showCCReport(arch[mk][id]); return; } }
    showAlert('Count not found.','warning');
  });
}

function deleteSession(sessionId) {
  if (!db) { showAlert('Not connected.','warning'); return; }
  db.ref('cycleCount6049/' + sessionId).remove()
    .then(() => {
      closeModal();
      showAlert('Session ' + sessionId + ' deleted.', 'success');
      if (window._ccLastSession && window._ccLastSession.id === sessionId) {
        window._ccLastSession = null;
      }
      showCycleCountStart();
    })
    .catch(err => { showAlert('Error deleting session: ' + err.message, 'danger'); });
}

function showCCReport(session) {
  state.currentView = 'ccreport';
  const adjs = session.adjustments||[];
  const getAdj = (loc) => adjs.find(a=>a.loc===loc);

  let totExpPlt=0, totExpPcs=0, totActPlt=0, totActPcs=0;
  session.entries.forEach(e => {
    const a = getAdj(e.loc);
    const adjAdd2 = a?(a.adjAdd||0):0, adjMiss2 = a?(a.adjMiss||0):0;
    const adjPlt = adjAdd2 - adjMiss2;
    const pcsPerPlt = e.expectedPlt>0 ? e.expectedPcs/e.expectedPlt : 0;
    totExpPlt += e.expectedPlt||0; totExpPcs += e.expectedPcs||0;
    totActPlt += (e.expectedPlt||0) + adjPlt;
    totActPcs += Math.round((e.expectedPcs||0) + adjPlt*pcsPerPlt);
  });
  const totVarPlt = totActPlt - totExpPlt;
  const hasAdj = adjs.length > 0;
  // Bin accuracy: per LOCATION — a location is accurate if net adjustment = 0
  const nonEmptyLocs = [...new Set((session.entries||[]).filter(e=>!e.empty&&e.sku).map(e=>e.loc))];
  const totalLines7   = nonEmptyLocs.length;
  const accurateLines7 = nonEmptyLocs.filter(loc => {
    const a = getAdj(loc);
    return !a || ((a.adjAdd||0) === 0 && (a.adjMiss||0) === 0); // accurate = zero adjustments entered
  }).length;
  const binAcc = totalLines7>0 ? Math.round(accurateLines7/totalLines7*100) : 100;
  const adjCount = adjs.filter(a=>(a.adjAdd||0)-(a.adjMiss||0)!==0).length;

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:14px;font-weight:bold;color:var(--accent);letter-spacing:1px">${session.id}</div>
      <div style="font-size:11px;color:var(--text2)">${new Date(session.createdAt).toLocaleString()} · Created by ${session.countedBy}${session.counterName?` · <span style="color:var(--accent)">Counter: ${session.counterName}</span>`:''}
        ${hasAdj?` · <span style="color:var(--accent2)">✓ Adjustments entered</span>`:` · <span style="color:var(--warning)">Pending adjustments</span>`}
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="showCycleCountStart()">← Back</button>
      <button class="btn btn-sm" onclick="showCCCountSheetView('${session.id}')">📋 Count Sheet</button>
      <button class="btn btn-primary btn-sm" onclick="showCCAdjustments('${session.id}')">✎ Enter Adjustments</button>
      ${isAdmin()?`<button class="btn btn-sm" onclick="confirmDeleteSession('${session.id}')" style="background:rgba(224,62,62,0.1);color:var(--danger);border-color:rgba(224,62,62,0.5)">🗑 Delete Session</button>`:''}

      <button class="btn btn-sm" onclick="printCCCurrentSheet()">🖨 Print</button>
    </div>
  </div>
  <div class="stats-grid" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-label">LOCATIONS</div><div class="stat-value">${session.locations.length}</div></div>
    <div class="stat-card"><div class="stat-label">EXPECTED PLT</div><div class="stat-value">${totExpPlt}</div></div>
    <div class="stat-card"><div class="stat-label">ACTUAL PALLETS</div><div class="stat-value ${hasAdj?totVarPlt===0?'green':totVarPlt>0?'yellow':'red':''}">${hasAdj?totActPlt:'—'}</div></div>
    <div class="stat-card"><div class="stat-label">VARIANCE PLT</div><div class="stat-value ${totVarPlt===0?'green':totVarPlt>0?'yellow':'red'}">${hasAdj?(totVarPlt>=0?'+':'')+totVarPlt:'—'}</div></div>
    <div class="stat-card"><div class="stat-label">BIN ACCURACY</div><div class="stat-value ${binAcc>=100?'green':binAcc>=95?'yellow':'red'}">${accurateLines7}/${totalLines7}<br><span style="font-size:18px">${binAcc}%</span></div></div>
    <div class="stat-card"><div class="stat-label">VARIANCES</div><div class="stat-value ${adjCount>0?'yellow':'green'}">${adjCount}</div></div>
  </div>

  <!-- Expand All / Collapse All -->
  <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px">
    <button class="btn btn-sm" onclick="toggleAllLocSections(true)">▼ Expand All</button>
    <button class="btn btn-sm" onclick="toggleAllLocSections(false)">▶ Collapse All</button>
  </div>`;

  // Per-location COLLAPSED summary rows (accordion)
  session.locations.forEach((loc, li) => {
    const locEntries = session.entries.filter(e=>e.loc===loc);
    const locExpPlt = locEntries.reduce((s,e)=>s+(e.expectedPlt||0),0);
    const locExpPcs = locEntries.reduce((s,e)=>s+(e.expectedPcs||0),0);
    const locSkus = [...new Set(locEntries.filter(e=>e.sku).map(e=>e.sku))];

    // Compute location-level adjustment totals — apply adj ONCE per location
    const locAdj    = getAdj(loc);
    const locAdjAdd  = locAdj?(locAdj.adjAdd||0):0;
    const locAdjMiss = locAdj?(locAdj.adjMiss||0):0;
    const locNetAdj  = locAdjAdd - locAdjMiss;
    const locActPlt  = locExpPlt + locNetAdj;
    const locVarPlt  = locNetAdj;  // variance IS the net adjustment
    // Bin accuracy: accurate only if NO adjustments entered at all (not just net=0)
    const locBinAcc  = (locAdjAdd === 0 && locAdjMiss === 0) ? 100 : 0;
    const varColor = locVarPlt===0?'var(--accent2)':locVarPlt>0?'var(--warning)':'var(--danger)';
    const accColor = locBinAcc>=100?'var(--accent2)':locBinAcc>=95?'var(--warning)':'var(--danger)';
    const hasLocAdj = (locAdjAdd+locAdjMiss)>0;

    // Build detail rows (hidden by default)
    let detailRows = '';
    if (!locEntries.length || locEntries[0].empty) {
      detailRows = `<tr><td colspan="${hasAdj?11:8}" style="text-align:center;color:var(--text2);font-style:italic;padding:10px">No available inventory</td></tr>`;
    } else {
      locEntries.forEach(e => {
        const a = getAdj(e.loc);
        // Adjustments are per-location only — we don't know which SKU was affected
        const adjAdd3=0, adjMiss3=0, netR=0;
        const isAccR = locNetAdj===0;   // location-level accuracy
        const actPlt = e.expectedPlt;   // show expected; adj shown in location total row
        const pcsPerPlt = e.expectedPlt>0?e.expectedPcs/e.expectedPlt:0;
        const actPcs = e.expectedPcs;
        const varPcs = 0;
        const vColor = 'var(--accent2)';
        const rowAccColor = 'var(--text2)';

        (e.rows||[]).forEach((r,ri)=>{
          detailRows += `<tr style="background:${ri%2===0?'':'var(--surface)'}">
            <td style="color:var(--accent);font-weight:bold">${r.sku||''}</td>
            <td style="font-size:10px;color:var(--text2)">${(r.productId||state.skuNames[r.sku]||'')}</td>
            <td style="font-size:10px">${r.po||''}</td>
            <td style="font-size:10px">${r.lot||''}</td>
            <td style="font-size:10px">${r.skid||''}</td>
            <td style="text-align:center">1</td>
            <td style="text-align:right">${(r.pcs||0).toLocaleString()}</td>
            ${hasAdj?'<td></td><td></td><td></td><td></td>':'<td></td>'}
          </tr>`;
        });
        // SKU row with adjustments
        detailRows += `<tr style="background:var(--surface2);font-weight:bold">
          <td colspan="4" style="color:var(--text2);font-size:10px">${e.sku} — ${''}</td>
          <td></td>
          <td style="text-align:center;color:var(--accent2)">${e.expectedPlt}</td>
          <td style="text-align:right;color:var(--accent2)">${e.expectedPcs.toLocaleString()}</td>
          ${hasAdj?`
          <td style="text-align:right;color:${netR===0?'var(--text2)':netR>0?'var(--warning)':'var(--danger)'}">${netR===0?'—':(netR>0?'+':'')+netR}</td>
          <td style="text-align:right;color:var(--accent2)">${actPlt}</td>
          <td style="text-align:right;font-weight:bold;color:${vColor}">${varPcs!==0?(varPcs>0?'+':'')+varPcs.toLocaleString():'✓'}</td>
          <td style="font-size:10px;color:${rowAccColor}">${isAccR?'✓ ACCURATE':'✗ VARIANCE'}</td>`:'<td></td>'}
        </tr>`;
      });
    }

    html += `
    <div style="margin-bottom:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <!-- Collapsed header — always visible, click to expand -->
      <div onclick="toggleLocSection('loc-detail-${li}')" style="cursor:pointer;padding:10px 14px;background:var(--surface);display:grid;grid-template-columns:28px 100px 1fr auto auto auto auto auto;gap:8px;align-items:center;user-select:none"
           onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='var(--surface)'">
        <span id="loc-chevron-${li}" style="color:var(--accent2);font-size:13px">▶</span>
        <span style="font-weight:bold;color:var(--accent);font-size:13px">${loc}</span>
        <span style="font-size:11px;color:var(--text2)">${locSkus.length} SKU${locSkus.length!==1?'s':''} · ${locExpPlt} exp plt · ${locExpPcs.toLocaleString()} pcs</span>
        ${hasAdj?`
        <span style="font-size:11px;font-weight:bold;color:${varColor}">${locVarPlt===0?'—':(locVarPlt>0?'+':'')+locVarPlt} var</span>
        <span style="font-size:11px;font-weight:bold;color:${varColor}">${hasAdj?locActPlt+' act':'—'}</span>
        <span style="font-size:11px;font-weight:bold;color:${accColor}">${locBinAcc}% bin</span>
        <span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${hasLocAdj?'rgba(240,101,101,0.12)':'rgba(26,158,122,0.12)'};color:${hasLocAdj?'var(--danger)':'var(--accent2)'}">${hasLocAdj?'✗ VARIANCE':'✓ ACCURATE'}</span>`
        :`<span></span><span></span><span></span><span></span>`}
      </div>
      <!-- Expandable detail -->
      <div id="loc-detail-${li}" style="display:none;overflow-x:auto">
        <table class="sku-table" style="font-size:11px;margin:0">
          <thead><tr>
            <th>SKU</th><th>PRODUCT ID</th><th>PO #</th><th>LOT #</th><th>SKID ID</th>
            <th style="text-align:center">PLT</th><th style="text-align:right">PCS</th>
            ${hasAdj?'<th style="text-align:right;color:var(--warning)">ADJ PLT</th><th style="text-align:right;color:var(--accent2)">ACTUAL PALLETS</th><th style="text-align:right">VAR PCS</th><th>BIN ACC</th>':'<th>COUNT NOTES</th>'}
          </tr></thead>
          <tbody>${detailRows}</tbody>
        </table>
      </div>
    </div>`;
  });

  document.getElementById('main-panel').innerHTML = html;
  window._ccLastSession = session;
}

function showCCAdjustments(sessionId) {
  state.currentView = 'ccadjust';
  const load = (session) => {
    const adjs   = session.adjustments || [];
    const getAdj = (loc) => adjs.find(a => a.loc === loc);

    // One row per LOCATION (not per SKU)
    const rows = [];
    session.locations.forEach(loc => {
      const entries = (session.entries||[]).filter(e => e.loc===loc);
      const expPallets = entries.reduce((s,e) => s+(e.expectedPlt||0), 0);
      const saved    = getAdj(loc) || {};
      rows.push({
        loc,
        expPallets,
        adjAdd:  saved.adjAdd  || 0,
        adjMiss: saved.adjMiss || 0,
        notes:   saved.notes   || '',
        isEmpty: entries.length === 0 || entries[0].empty,
        added:   false
      });
    });
    // Include any location that has a saved adjustment but wasn't part of the
    // original count — e.g. inventory found in a location expected to be empty.
    adjs.forEach(a => {
      if (a && a.loc && !rows.some(r => r.loc === a.loc)) {
        rows.push({ loc:a.loc, expPallets:0, adjAdd:a.adjAdd||0, adjMiss:a.adjMiss||0,
          notes:a.notes||'', isEmpty:true, added:true });
      }
    });

    const totalExp = rows.reduce((s,r) => s+(r.expPallets||0), 0);

    let html = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:16px;font-weight:bold;letter-spacing:1px">✎ ENTER ADJUSTMENTS</div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px">${session.id} &nbsp;·&nbsp; Both ADD and MISSING are positive entries</div>

// Locations offered in the "Add Location" datalist: every known warehouse
// location plus anything currently in inventory or this session.
function getAdjLocationOptions() {
  const set = new Set();
  (window._ccHistoricLocs || []).forEach(l => l && set.add(l));
  (state.inventory || []).forEach(r => { if (r.location) set.add(r.location); });
  const sess = window._ccAdjSession;
  if (sess && sess.locations) sess.locations.forEach(l => l && set.add(l));
  (window._ccAdjRows || []).forEach(r => { if (r.loc) set.delete(r.loc); }); // hide ones already in the grid
  return [...set].sort();
}

// Read current input values from the DOM back into _ccAdjRows so a re-render
// (e.g. after adding a location) doesn't lose what the user already typed.
function syncAdjInputs() {
  const rows = window._ccAdjRows || [];
  rows.forEach((r, idx) => {
    const a = document.getElementById('adj-add-'+idx);
    const m = document.getElementById('adj-miss-'+idx);
    const n = document.getElementById('adj-notes-'+idx);
    if (a) r.adjAdd  = parseInt(a.value)  || 0;
    if (m) r.adjMiss = parseInt(m.value)  || 0;
    if (n) r.notes   = n.value || '';
  });
}

// Build the adjustments table body from _ccAdjRows. Every row (including empty
// locations and added locations) is rendered and uses its FULL-array index for
// input IDs, so render / updateAdjRow / saveAdjustments stay in lock-step.
function renderAdjTable() {
  const tbody = document.getElementById('adj-tbody');
  if (!tbody) return;
  const rows = window._ccAdjRows || [];
  const inputStyle = 'width:65px;text-align:center;border:1.5px solid;border-radius:5px;padding:5px 6px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;-webkit-appearance:none;-moz-appearance:textfield;appearance:none;';
  let html = '';
  rows.forEach((r, idx) => {
    const isZero   = (r.expPallets || 0) === 0;
    const emptyTag = isZero ? '<span style="font-size:9px;font-weight:700;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;margin-left:6px;letter-spacing:1px">EMPTY</span>' : '';
    // MISSING can't apply to a location that expected 0 pallets — disable it there.
    const missAttrs = isZero ? 'value="0" disabled title="No pallets expected here"' : 'value="'+(r.adjMiss||0)+'"';
    const missStyle = isZero ? inputStyle+'background:var(--surface2);border-color:var(--border);opacity:.5;cursor:not-allowed;' : inputStyle+'background:rgba(224,62,62,0.06);border-color:var(--danger);';
    const removeBtn = r.added ? '<button onclick="removeAdjLocation('+idx+')" title="Remove this added location" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px;padding:2px 4px;margin-left:4px">✕</button>' : '';
    html += `
      <tr style="border-bottom:1px solid var(--border)${r.added?';background:rgba(26,158,122,0.04)':''}">
        <td style="padding:7px 10px;font-weight:bold;color:var(--accent);white-space:nowrap">${r.loc}${emptyTag}</td>
        <td style="padding:7px 10px;text-align:right;font-weight:bold">${r.expPallets||0}</td>
        <td style="padding:7px 10px;text-align:center">
          <input id="adj-add-${idx}" type="text" inputmode="numeric" pattern="[0-9]*" value="${r.adjAdd||0}"
            oninput="updateAdjRow()"
            style="${inputStyle}background:rgba(26,158,122,0.06);border-color:var(--accent2);">
        </td>
        <td style="padding:7px 10px;text-align:center">
          <input id="adj-miss-${idx}" type="text" inputmode="numeric" pattern="[0-9]*" ${missAttrs}
            oninput="updateAdjRow()"
            style="${missStyle}">
        </td>
        <td id="adj-net-${idx}" style="padding:7px 10px;text-align:right;font-weight:bold">—</td>
        <td id="adj-act-${idx}" style="padding:7px 10px;text-align:right;font-weight:bold;color:var(--accent)">${r.expPallets||0}</td>
        <td id="adj-acc-${idx}" style="padding:7px 10px;text-align:center;font-size:11px;font-weight:bold;color:var(--accent2)">✓ ACCURATE</td>
        <td id="adj-cacc-${idx}" style="padding:7px 10px;text-align:center;font-weight:bold;color:var(--accent2)">100%</td>
        <td style="padding:7px 10px;white-space:nowrap">
          <input id="adj-notes-${idx}" type="text" value="${(r.notes||'').replace(/"/g,'&quot;')}" placeholder="Notes..."
            style="width:150px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-family:var(--font);font-size:11px;outline:none">${removeBtn}
        </td>
      </tr>`;
  });
  tbody.innerHTML = html;
}

// Add a location (typically empty / uncounted) so found inventory can be recorded.
function addAdjLocation() {
  const input = document.getElementById('adj-add-loc');
  if (!input) return;
  const loc = (input.value || '').trim().toUpperCase();
  if (!loc) { showAlert('Enter a location code first.','warning'); return; }
  syncAdjInputs();
  const rows = window._ccAdjRows || (window._ccAdjRows = []);
  const existingIdx = rows.findIndex(r => r.loc === loc);
  if (existingIdx !== -1) {
    input.value = '';
    showAlert('Location ' + loc + ' is already in the grid.','warning');
    const el = document.getElementById('adj-add-'+existingIdx);
    if (el) { el.focus(); el.select(); }
    return;
  }
  rows.push({ loc, expPallets:0, adjAdd:0, adjMiss:0, notes:'', isEmpty:true, added:true });
  input.value = '';
  renderAdjTable();
  updateAdjRow();
  // refresh datalist so the just-added loc drops out of the options
  const dl = document.getElementById('adj-loc-options');
  if (dl) dl.innerHTML = getAdjLocationOptions().map(l=>'<option value="'+l+'">').join('');
  const newIdx = rows.length - 1;
  const el = document.getElementById('adj-add-'+newIdx);
  if (el) { el.focus(); el.select(); }
  showAlert('✓ Added ' + loc + ' — enter the pallets found.','success');
}

function removeAdjLocation(idx) {
  const rows = window._ccAdjRows || [];
  if (!rows[idx] || !rows[idx].added) return; // only added locations can be removed
  syncAdjInputs();
  rows.splice(idx, 1);
  renderAdjTable();
  updateAdjRow();
  const dl = document.getElementById('adj-loc-options');
  if (dl) dl.innerHTML = getAdjLocationOptions().map(l=>'<option value="'+l+'">').join('');
}





function updateAdjRow(idx, expPallets) {
  const rows = window._ccAdjRows || [];

  let totalAdd=0, totalMiss=0, totalExp=0, totalAct=0, accurateCount=0, lineCount=0;

  rows.forEach((r, i) => {
    const addEl  = document.getElementById('adj-add-'+i);
    const missEl = document.getElementById('adj-miss-'+i);
    if (!addEl || !missEl) return;

    const add  = parseInt(addEl.value)  || 0;
    const miss = parseInt(missEl.value) || 0;
    const exp  = r.expPallets || 0;
    const net  = add - miss;
    const act  = exp + net;
    const isAccurate = (net === 0);

    totalAdd  += add;
    totalMiss += miss;
    totalExp  += exp;
    totalAct  += act;
    lineCount++;
    if (isAccurate) accurateCount++;

    // Count accuracy: for expected>0 use the usual formula; for an empty location,
    // finding pallets (add>0) is a 0% count, otherwise it's 100%.
    const countPct = exp > 0
      ? Math.max(0, Math.round((1 - (add + miss)/exp)*100))
      : (add > 0 ? 0 : 100);
    const netEl    = document.getElementById('adj-net-'+i);
    const actEl    = document.getElementById('adj-act-'+i);
    const accEl    = document.getElementById('adj-acc-'+i);
    const caccEl   = document.getElementById('adj-cacc-'+i);

    if (netEl)  { netEl.textContent  = (net>=0?'+':'')+net; netEl.style.color = net===0?'var(--text2)':net>0?'var(--accent2)':'var(--danger)'; }
    if (actEl)  { actEl.textContent  = act; actEl.style.color = isAccurate?'var(--accent)':act<exp?'var(--danger)':'var(--accent2)'; }
    if (accEl)  { accEl.innerHTML    = isAccurate?'<span style="color:var(--accent2)">✓ ACCURATE</span>':'<span style="color:var(--danger)">✗ VARIANCE</span>'; }
    if (caccEl) { caccEl.textContent = countPct+'%'; caccEl.style.color = countPct>=100?'var(--accent2)':countPct>=90?'var(--warning)':'var(--danger)'; }
  });

  const totalNet = totalAdd - totalMiss;
  const binPct   = lineCount > 0 ? Math.round(accurateCount/lineCount*100) : 100;
  const caccPct  = totalExp > 0 ? Math.max(0, Math.round((1 - (totalAdd + totalMiss)/totalExp)*100)) : 100;
  const caccColor= caccPct>=100?'var(--accent2)':caccPct>=90?'var(--warning)':'var(--danger)';
  const binColor = binPct>=100?'var(--accent2)':binPct>=90?'var(--warning)':'var(--danger)';

  // Summary bar
  const set = (id,val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  const setColor = (id,c) => { const el=document.getElementById(id); if(el) el.style.color=c; };
  set('rt-add',  totalAdd);                                          setColor('rt-add',  totalAdd>0?'var(--accent2)':'var(--text2)');
  set('rt-miss', totalMiss);                                         setColor('rt-miss', totalMiss>0?'var(--danger)':'var(--text2)');
  set('rt-net',  (totalNet>=0?'+':'')+totalNet);                     setColor('rt-net',  totalNet===0?'var(--text2)':totalNet>0?'var(--accent2)':'var(--danger)');
  set('rt-act',  totalAct);
  set('rt-acc',  accurateCount+'/'+lineCount+' ('+binPct+'%)');      setColor('rt-acc',  binColor);
  set('rt-cacc', caccPct+'%');                                        setColor('rt-cacc', caccColor);

  // Grand total row
  set('gt-add',  '+'+totalAdd);   setColor('gt-add',  totalAdd>0?'var(--accent2)':'var(--text2)');
  set('gt-miss', '-'+totalMiss);  setColor('gt-miss', totalMiss>0?'var(--danger)':'var(--text2)');
  set('gt-net',  (totalNet>=0?'+':'')+totalNet); setColor('gt-net', totalNet===0?'var(--text2)':totalNet>0?'var(--accent2)':'var(--danger)');
  set('gt-act',  totalAct);       setColor('gt-act',  'var(--accent)');
  set('gt-acc',  binPct+'%');     setColor('gt-acc',  binColor);
  set('gt-cacc', caccPct+'%');    setColor('gt-cacc', caccColor);
}

// Save adjustments to Firebase
function saveAdjustments() {
  const session = window._ccAdjSession;
  if (!session || !db) { showAlert('Nothing to save.','warning'); return; }

  const rows = window._ccAdjRows || [];
  const adjustments = rows.map((r, i) => {
    const add   = parseInt(document.getElementById('adj-add-'+i)?.value)  || 0;
    const miss  = parseInt(document.getElementById('adj-miss-'+i)?.value) || 0;
    const notes = document.getElementById('adj-notes-'+i)?.value || '';
    return { loc:r.loc, adjAdd:add, adjMiss:miss, notes };
  }).filter(a => a.adjAdd||a.adjMiss||a.notes);

  const counterName = ((document.getElementById('adj-counter-name')||{}).value||'').trim();

  const updates = {};
  updates['cycleCount6049/'+session.id+'/adjustments'] = adjustments;
  updates['cycleCount6049/'+session.id+'/counterName'] = counterName;

  db.ref().update(updates)
    .then(() => {
      showAlert('✓ Adjustments saved.','success');
      session.adjustments = adjustments;
      session.counterName = counterName;
      window._ccLastSession = session;
    })
    .catch(err => showAlert('Error: '+err.message,'danger'));
}

function showPendingPutAway() {
  state.currentView = 'putaway';
  const PUT_AWAY_LOCS = ['22-TR', '22-RR', '22-GENERAL'];
  const inv = ((state.rawInventory&&state.rawInventory.length)?state.rawInventory:state.inventory).filter(r => {
    if ((r.pcsPending||0) > 0) return false;
    const loc = (r.location||'').trim().toUpperCase();
    return PUT_AWAY_LOCS.some(p => loc.startsWith(p) || loc.includes(p));
  });
  if (!inv.length) { showAlert('No pending put away inventory found in 22-TR, 22-RR, or 22-GENERAL locations.','warning'); return; }

  // Group: Customer → Date → BOL → SKU → pallets
  const grouped = {};
  inv.forEach(r => {
    const cust = r.customer||'UNKNOWN';
    const dt   = r.dateRecd ? new Date(r.dateRecd).toLocaleDateString('en-US') : 'Unknown Date';
    const bol  = r.bol||'—';
    const sku  = r.sku||'—';

    if (!grouped[cust][dt][bol][sku]) grouped[cust][dt][bol][sku] = [];
    grouped[cust][dt][bol][sku].push(r);
  });

  const customers = Object.keys(grouped).sort();
  const totalPcs  = inv.reduce((s,r)=>s+(r.pcs||0),0);
  const totalBOLs  = new Set(inv.map(r=>r.bol).filter(Boolean)).size;

  let skuRowIdx = 0;

  let h = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div style="font-size:14px;font-weight:bold;letter-spacing:2px">📥 PENDING PUT AWAY</div>

function exportPendingPutAway() {
  const PUT_AWAY_LOCS = ['22-TR', '22-RR', '22-GENERAL'];
  const inv = ((state.rawInventory&&state.rawInventory.length)?state.rawInventory:state.inventory).filter(r => {
    if ((r.pcsPending||0) > 0) return false;
    const loc = (r.location||'').trim().toUpperCase();
    return PUT_AWAY_LOCS.some(p => loc.startsWith(p) || loc.includes(p));
  });
  if (!inv.length) { showAlert('No pending put away inventory to export.','warning'); return; }
  const dc = (a,b) => { const ta=new Date(a).getTime(), tb=new Date(b).getTime(); if(isNaN(ta)&&isNaN(tb))return 0; if(isNaN(ta))return 1; if(isNaN(tb))return -1; return ta-tb; };
  const fmtD = v => v ? new Date(v).toLocaleDateString() : '';
  // One row per physical pallet - sorted to make cleaning the pending easy.
  const rows = inv.slice().sort((a,b)=>
    (a.customer||'').localeCompare(b.customer||'') ||
    dc(a.dateRecd,b.dateRecd) ||
    (a.bol||'').localeCompare(b.bol||'') ||
    (a.sku||'').localeCompare(b.sku||'') ||
    (a.location||'').localeCompare(b.location||'') ||
    (a.lot||'').localeCompare(b.lot||'') ||
    (a.skid||'').localeCompare(b.skid||''));
  const data = [['CUSTOMER','DATE RECD','BU','INBOUND BOL','SKU','LOCATION','LOT #','SKID ID']];
  rows.forEach(r => data.push([ r.customer||'', fmtD(r.dateRecd), r.bu||'', r.bol||'', r.sku||'', r.location||'', r.lot||'', r.skid||'' ]));
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:20},{wch:12},{wch:14},{wch:16},{wch:16},{wch:16},{wch:16},{wch:16}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Pending Put Away');
  XLSX.writeFile(wb, 'PickFlow_6049_PendingPutAway_'+new Date().toISOString().slice(0,10)+'.xlsx');
  showAlert('Pending Put Away exported to Excel ('+rows.length+' pallets).','success');
}

function paToggle(id) {
  const el=document.getElementById(id); if(!el) return;
  const idx=id.replace('pa-','');
  const chev=document.getElementById('pa-chev-'+idx);
  const open=el.style.display==='none';
  el.style.display=open?'block':'none';
  if(chev) chev.textContent=open?'▼':'▶';
}
function paSkuToggle(rowId) {
  const chev=document.getElementById(rowId+'-chev');
  const hdr=document.getElementById(rowId+'-lot-hdr');
  const lots=document.querySelectorAll('[id^="'+rowId+'-lot-"]:not([id$="-hdr"])');
  if(!lots.length) return;
  const open=lots[0].style.display==='none';
  if(hdr) hdr.style.display=open?'table-row':'none';
  lots.forEach(el=>el.style.display=open?'table-row':'none');
  if(chev){
    const count=lots.length;
    chev.textContent=open?('▼ '+count+' lots'):('▶ '+count+' lots');
    chev.style.color=open?'var(--warning)':'var(--accent2)';
  }
}

}

function showLastPutAway(filterDate='') {
  state.currentView = 'lastputaway';

  const allDates = [...new Set(inv.map(r=>r.dateRecd?new Date(r.dateRecd).toLocaleDateString('en-US'):null).filter(Boolean))].sort((a,b)=>new Date(b)-new Date(a));

  // Use most recent date if no filter set
  const selectedDate = filterDate || allDates[0] || '';

  const filtered = selectedDate ? inv.filter(r=>{
    if (!r.dateRecd) return false;

      <div style="font-size:9px;color:var(--text2);letter-spacing:1px">TOTAL PCS</div>
      <div style="font-size:22px;font-weight:bold;color:var(--warning)">${Math.round(totalPcs).toLocaleString()}</div>
    </div>
  </div>`;

  if (!filtered.length) {
    h += `<div class="alert alert-info">No inventory found for the selected date.</div>`;
  } else {

      const custData = grouped[cust];
