// ─── LOCATION CAPACITY (6049) — ported from Capacity·CycleCount app (v27) ──────
function showLocationCapacity() {
  state.currentView = 'capacity';
  const locMap = {};
  // Seed all capacity-ref locations first (ensures empty locations show)
  Object.keys(state.capacityRef).forEach(loc => {
    locMap[loc] = { location:loc, utl:0, skus:[], maxCap:state.capacityRef[loc]||0 };
  });
  // Fill from rawInventory — pallets = pcs / qtyGuide[sku]
  state.rawInventory.forEach(r => {
    if (!r.location) return;
    if (!locMap[r.location]) locMap[r.location] = { location:r.location, utl:0, skus:[], maxCap:state.capacityRef[r.location]||0 };
    const pq = state.qtyGuide[r.sku];
    const pal = pq ? (r.pcs||0)/pq : 0;
    locMap[r.location].utl += pal;
    let sk = locMap[r.location].skus.find(s=>s.sku===r.sku);
    if (!sk) { sk={sku:r.sku,pal:0,pcs:0,expDates:[]}; locMap[r.location].skus.push(sk); }
    sk.pal += pal;
    sk.pcs += r.pcs||0;
    if (r.expDate) sk.expDates.push(new Date(r.expDate));
  });

  const locs = Object.values(locMap);
  const hasRef = Object.keys(state.capacityRef).length > 0;
  const totMaxCap = locs.reduce((s,l)=>s+(l.maxCap||0),0);
  const totUtl = locs.reduce((s,l)=>s+l.utl,0);
  const totAvail = Math.max(0,totMaxCap-totUtl);
  const pctCap = totMaxCap>0 ? Math.round(totUtl/totMaxCap*100) : null;

  const fi = 'background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:var(--font);font-size:11px;outline:none;width:100%';

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div style="font-size:13px;font-weight:bold;letter-spacing:2px;color:var(--text)">📦 LOCATION CAPACITY</div>
    <div style="display:flex;gap:8px">
      ${!hasRef?'<span style="font-size:11px;color:var(--warning);padding:4px 10px;background:rgba(251,191,36,0.1);border-radius:4px;border:1px solid rgba(251,191,36,0.3)">⚠ Import Capacity Reference for Max Cap data</span>':''}
      <button class="btn btn-sm" onclick="exportCapacityExcel()">⬇ Export Excel</button>
    </div>
  </div>`;

  if (hasRef) {
    const pctColor = pctCap>=90?'#e74c3c':pctCap>=70?'#e67e22':pctCap>=50?'#f1c40f':'#27ae60';
    html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:grid;grid-template-columns:repeat(6,1fr);gap:8px;text-align:center">
      <div><div style="font-size:9px;color:var(--text2);letter-spacing:1px;margin-bottom:4px">TOTAL LOCATIONS</div><div style="font-size:24px;font-weight:bold;color:var(--text)">${locs.length.toLocaleString()}</div></div>
      <div><div style="font-size:9px;color:var(--text2);letter-spacing:1px;margin-bottom:4px">TOT PALLETS</div><div style="font-size:24px;font-weight:bold;color:var(--accent)">${Math.round(totUtl).toLocaleString()}</div></div>
      <div><div style="font-size:9px;color:var(--text2);letter-spacing:1px;margin-bottom:4px">TOT MAX CAP</div><div style="font-size:24px;font-weight:bold;color:var(--text)">${Math.round(totMaxCap).toLocaleString()}</div></div>
      <div><div style="font-size:9px;color:var(--text2);letter-spacing:1px;margin-bottom:4px">TOT UTILIZ CAP</div><div style="font-size:24px;font-weight:bold;color:var(--warning)">${Math.round(totUtl).toLocaleString()}</div></div>
      <div><div style="font-size:9px;color:var(--text2);letter-spacing:1px;margin-bottom:4px">TOT AVAIL CAP</div><div style="font-size:24px;font-weight:bold;color:var(--accent2)">${Math.round(totAvail).toLocaleString()}</div></div>
      <div><div style="font-size:9px;color:var(--text2);letter-spacing:1px;margin-bottom:4px">% OF CAP</div><div style="font-size:24px;font-weight:bold;color:${pctColor}">${pctCap}%</div></div>
    </div>`;
  } else {
    html += `<div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">LOCATIONS</div><div class="stat-value">${locs.length}</div></div>
      <div class="stat-card"><div class="stat-label">TOTAL PALLETS</div><div class="stat-value yellow">${Math.round(totUtl)}</div></div>
      <div class="stat-card"><div class="stat-label">INVENTORY RECORDS</div><div class="stat-value green">${state.rawInventory.length.toLocaleString()}</div></div>
    </div>`;
  }

  html += `<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:12px;align-items:flex-end">
    <div class="form-group" style="margin:0"><label>FILTER LOCATION</label><input type="text" id="cap-filter-loc" placeholder="Location..." oninput="renderCapTable()" style="${fi}"></div>
    <div class="form-group" style="margin:0"><label>FILTER SKU</label><input type="text" id="cap-filter-sku" placeholder="SKU..." oninput="renderCapTable()" style="${fi}"></div>
    <button class="btn btn-sm" onclick="document.getElementById('cap-filter-loc').value='';document.getElementById('cap-filter-sku').value='';renderCapTable()">✕ Clear</button>
  </div>
  <div id="cap-table-wrap"></div>`;

  document.getElementById('main-panel').innerHTML = html;
  window._capLocMap = locMap;
  window._capHasRef = hasRef;
  renderCapTable();
}

function utlColor(pct) {
  if (pct>=100) return '#e03e3e';
  if (pct>=90)  return '#e03e3e';
  if (pct>=70)  return '#d97706';
  if (pct>=50)  return '#d97706';
  if (pct>=25)  return '#1a9e7a';
  if (pct>0)    return '#1a9e7a';
  return '#d0d7e8';
}

function renderCapTable() {
  const locMap = window._capLocMap||{};
  const hasRef = window._capHasRef;
  const locF = (document.getElementById('cap-filter-loc')||{}).value||'';
  const skuF = (document.getElementById('cap-filter-sku')||{}).value||'';
  let locs = Object.values(locMap).sort((a,b)=>a.location.localeCompare(b.location));
  if (locF) locs = locs.filter(l=>l.location.toLowerCase().includes(locF.toLowerCase()));
  if (skuF) locs = locs.filter(l=>l.skus.some(s=>s.sku.toLowerCase().includes(skuF.toLowerCase())));

  if (!locs.length) { document.getElementById('cap-table-wrap').innerHTML='<div style="padding:20px;text-align:center;color:var(--text2)">No locations match filters.</div>'; return; }

  const sth = 'position:sticky;top:0;z-index:2;background:var(--surface);border-bottom:2px solid var(--border);padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--text2);white-space:nowrap;';
  let t = `<div class="cap-table-wrap"><table class="cap-table"><thead><tr>
    <th style="${sth}">LOCATION</th>`;
  if (hasRef) t += `<th style="${sth}text-align:right">MAX CAP</th><th style="${sth}text-align:right">UTL</th><th style="${sth}text-align:right">AVAIL CAP</th><th style="${sth}text-align:center;min-width:80px">% OF UTL</th>`;
  else t += `<th style="${sth}text-align:right">UTL PALLETS</th>`;
  t += `<th style="${sth}">SKU</th><th style="${sth}text-align:right">PAL</th><th style="${sth}text-align:right">PCS</th><th style="${sth}">PROD ID</th><th style="${sth}">EXP DATES</th></tr></thead><tbody>`;

  locs.forEach(loc => {
    const utl = Math.round(loc.utl*10)/10;
    const maxCap = loc.maxCap||0;
    const avail = Math.max(0, maxCap-utl);
    const pct = maxCap>0 ? Math.round(utl/maxCap*100) : null;
    const pctColor = pct!==null ? utlColor(pct) : 'var(--text2)';
    const pctBg = pct!==null ? pctColor+'22' : '';
    const skus = [...loc.skus].sort((a,b)=>b.pal-a.pal);

    if (skus.length===0) {
      t += `<tr>
        <td style="font-weight:bold;color:var(--accent)">${loc.location}</td>
        ${hasRef?`<td style="text-align:right">${maxCap}</td><td style="text-align:right">0</td><td style="text-align:right;color:var(--accent2)">${maxCap}</td><td style="text-align:center;background:${pctBg}"><span style="color:${pctColor};font-weight:bold;font-size:15px">0%</span></td>`:`<td style="text-align:right">0</td>`}
        <td colspan="5" style="color:var(--text2);font-style:italic">Empty</td>
      </tr>`;
      return;
    }

    skus.forEach((s,si) => {
      const expStr = [...new Set(s.expDates.map(d=>d.toLocaleDateString()))].sort().slice(0,3).join('  ');
      const name = state.skuNames[s.sku]||'';
      const palStr = Math.round(s.pal*10)/10;
      t += `<tr>
        ${si===0?`<td rowspan="${skus.length}" style="font-weight:bold;color:var(--accent);vertical-align:top">${loc.location}</td>`:''}
        ${si===0&&hasRef?`<td rowspan="${skus.length}" style="text-align:right;vertical-align:top">${maxCap}</td><td rowspan="${skus.length}" style="text-align:right;font-weight:bold;vertical-align:top">${utl}</td><td rowspan="${skus.length}" style="text-align:right;color:var(--accent2);font-weight:bold;vertical-align:top">${Math.round(avail)}</td><td rowspan="${skus.length}" style="text-align:center;background:${pctBg};vertical-align:middle;padding:10px"><span style="color:${pctColor};font-weight:bold;font-size:16px">${pct!==null?pct+'%':'—'}</span></td>`:si===0&&!hasRef?`<td rowspan="${skus.length}" style="text-align:right;font-weight:bold;vertical-align:top">${utl}</td>`:''}
        <td style="color:var(--accent);font-weight:bold">${s.sku}</td>

        <td style="font-size:10px;color:var(--text2)">${name}</td>
        <td style="font-size:10px;color:var(--text2)">${expStr}</td>
      </tr>`;
    });
  });

  t += `</tbody></table></div><div style="font-size:11px;color:var(--text2);margin-top:8px;text-align:right">${locs.length} locations shown</div>`;
  document.getElementById('cap-table-wrap').innerHTML = t;
}

function exportCapacityExcel() {
  const locMap = window._capLocMap||{};
  const hasRef = window._capHasRef;
  const locs = Object.values(locMap).sort((a,b)=>a.location.localeCompare(b.location));
  const totMaxCap = locs.reduce((s,l)=>s+(l.maxCap||0),0);
  const totUtl = locs.reduce((s,l)=>s+l.utl,0);
  const pctCap = totMaxCap>0?Math.round(totUtl/totMaxCap*100):null;
  const wb = XLSX.utils.book_new();
  const summary = [['','','Tot_Plts'],['','',Math.round(totUtl)],[],
    ['Tot_Max_Cap','Tot_Utiliz_Cap','Tot_Avail_Cap','% Of_Cap'],
    [Math.round(totMaxCap),Math.round(totUtl),Math.round(Math.max(0,totMaxCap-totUtl)),pctCap!==null?pctCap/100:null],[],
    hasRef?['Location_name','Max Cap','Utl','Avail Cap','% of Utl','SKU','Prod ID','Exp Dates','SKU Breakdown']:['Location_name','Utl','SKU','Prod ID','Exp Dates']];
  locs.forEach(loc => {
    const utl = Math.round(loc.utl*10)/10;
    const maxCap = loc.maxCap||0;
    const avail = Math.max(0,maxCap-utl);
    const pct = maxCap>0?utl/maxCap:null;
    const skus = [...loc.skus].sort((a,b)=>b.pal-a.pal);
    const breakdown = skus.length>1?skus.map(s=>s.sku+':'+Math.round(s.pal*10)/10).join(', '):'';
    if (skus.length===0) {
      summary.push(hasRef?[loc.location,maxCap,0,maxCap,0,'','','','']:[loc.location,0,'','','']);
    } else {
      skus.forEach((s,si) => {
        const expStr = [...new Set(s.expDates.map(d=>d.toLocaleDateString()))].sort().slice(0,3).join(', ');
        const name = state.skuNames[s.sku]||'';
        summary.push(hasRef?[si===0?loc.location:'',si===0?maxCap:'',si===0?utl:'',si===0?Math.round(avail):'',si===0?pct:'',s.sku,name,expStr,si===0?breakdown:'']:[si===0?loc.location:'',si===0?utl:'',s.sku,name,expStr]);
      });
    }
  });
  const ws = XLSX.utils.aoa_to_sheet(summary);
  if (hasRef) ws['!cols']=[{wch:20},{wch:10},{wch:10},{wch:12},{wch:10},{wch:12},{wch:28},{wch:28},{wch:30}];
  else ws['!cols']=[{wch:20},{wch:10},{wch:12},{wch:28},{wch:28}];
  XLSX.utils.book_append_sheet(wb, ws, 'Location Capacity');
  XLSX.writeFile(wb,'LocationCapacity_6049_'+new Date().toISOString().slice(0,10)+'.xlsx');
  showAlert('✓ Exported.','success');
}

function showInventorySummary() {
  // Source full set so all statuses (picked/ghost/cycle/damaged) are represented,
  // not the picking-filtered state.inventory subset.
  const inv = (state.rawInventory && state.rawInventory.length) ? state.rawInventory : state.inventory;
  if (!inv || !inv.length) { showAlert('No inventory loaded.','warning'); return; }
  state.currentView = 'invsummary';

  const getStatus = r => {
    if ((r.pcsPending||0) > 0) return 'PICKED';
    const loc = (r.location||'').toUpperCase();
    const st  = (r.status||'').toUpperCase();
    if (loc.includes('22-GHOST') || st === 'GHOST') return 'GHOST';
    if (st === 'DAMAGED' || loc.includes('22-REWORK')) return 'DAMAGED';
    if (loc.includes('CYC_CNT') || loc.includes('CYC-CNT') || loc.includes('22-CYCLE') || st === 'CYCLE COUNT') return 'CYCLE COUNT';
    return 'AVAILABLE';
  };

  const statuses = ['AVAILABLE','PICKED','DAMAGED','CYCLE COUNT','GHOST'];
  const allCols = [...statuses, 'TOTAL'];
  const statusColors = {
    'AVAILABLE':'var(--accent2)', 'PICKED':'var(--warning)',
    'DAMAGED':'var(--danger)', 'CYCLE COUNT':'var(--accent)',
    'GHOST':'var(--text2)', 'TOTAL':'var(--text)'
  };

  const customers = [...new Set(inv.map(r=>r.customer||'UNKNOWN'))].sort();
  const emptyBucket = () => ({pallets:0, pcs:0});
  // Pallets = skid count (each inventory record = one skid/pallet position).
  const addTo = (b, r) => { b.pallets += 1; b.pcs += (r.pcs||0); };

  const map = {};
  customers.forEach(c => { map[c] = {}; allCols.forEach(s => map[c][s] = emptyBucket()); });

  inv.forEach(r => {
    const c = r.customer||'UNKNOWN';
    const s = getStatus(r);
    if (!map[c]) return;
    addTo(map[c][s], r); addTo(map[c]['TOTAL'], r);
  });

  const grand = {}; allCols.forEach(s => grand[s] = emptyBucket());
  inv.forEach(r => { const s=getStatus(r); addTo(grand[s],r); addTo(grand['TOTAL'],r); });

  // Headline = pallets (positions), subscript = pcs.
  const cell = (d, isTotal=false, color='') => {
    if (!d||(!d.pallets&&!d.pcs)) return `<td style="text-align:right;color:var(--text2);opacity:0.35;${isTotal?'font-weight:bold;border-left:2px solid var(--border)':''}">${isTotal?'0':'—'}</td>`;
    return `<td style="text-align:right;font-weight:${isTotal?'bold':'normal'};color:${color||statusColors['AVAILABLE']};${isTotal?'border-left:2px solid var(--border)':''}">
      <div style="font-weight:bold;font-size:${isTotal?'14px':'inherit'}">${Math.round(d.pallets).toLocaleString()}</div>
      <div style="font-size:9px;color:var(--text2)">${d.pcs.toLocaleString()} pcs</div>
    </td>`;
  };

  // Inventory Accuracy (by pallet count): (Total - Cycle Count - Ghost) / Total.
  const accPct = (m) => {
    const tot = (m && m['TOTAL'] && m['TOTAL'].pallets) || 0;
    if (!tot) return null;
    const off = ((m['CYCLE COUNT']&&m['CYCLE COUNT'].pallets)||0) + ((m['GHOST']&&m['GHOST'].pallets)||0);
    return (tot - off) / tot * 100;
  };
  const accColor = (a) => a>=98 ? 'var(--accent2)' : (a>=95 ? 'var(--warning)' : 'var(--danger)');
  const accCell = (m, big=false) => {
    const a = accPct(m);
    if (a===null) return '<td style="text-align:right;color:var(--text2);opacity:0.35">—</td>';
    return '<td style="text-align:right;font-weight:bold;color:'+accColor(a)+';font-size:'+(big?'14px':'inherit')+'">'+a.toFixed(1)+'%</td>';
  };
  const grandAcc = accPct(grand);
  const grandOff = ((grand['CYCLE COUNT']&&grand['CYCLE COUNT'].pallets)||0) + ((grand['GHOST']&&grand['GHOST'].pallets)||0);
  const grandTotPal = (grand['TOTAL']&&grand['TOTAL'].pallets)||0;

  let rows = '';
  customers.forEach((c,i) => {
    rows += `
    <tr style="background:${i%2!==0?'var(--surface)':''}">
      <td style="font-weight:bold">${c}</td>
      ${accCell(map[c])}
      ${allCols.map(s=>cell(map[c][s], s==='TOTAL', statusColors[s])).join('')}
    </tr>`;
  });

  let h = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:14px;font-weight:bold;letter-spacing:2px">📦 INVENTORY SUMMARY — PALLETS BY CUSTOMER</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">Last import: ${state.lastImport?new Date(state.lastImport).toLocaleString():'—'}</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center" title="Inventory Accuracy = (Total - Cycle Count - Ghost) / Total, by pallet count">
      <div style="font-size:9px;color:var(--accent);letter-spacing:1px;font-weight:bold;margin-bottom:4px">INV ACCURACY</div>
      <div style="font-size:20px;font-weight:bold;color:${grandAcc!=null?accColor(grandAcc):'var(--text2)'}">${grandAcc!=null?grandAcc.toFixed(1)+'%':'—'}</div>
      <div style="font-size:10px;color:var(--text2)">${Math.round(grandOff).toLocaleString()} of ${Math.round(grandTotPal).toLocaleString()} off</div>
    </div>
    ${allCols.map(s=>`
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center">
        <div style="font-size:9px;color:${statusColors[s]};letter-spacing:1px;font-weight:bold;margin-bottom:4px">${s}</div>
        <div style="font-size:20px;font-weight:bold;color:${statusColors[s]}">${Math.round(grand[s]?.pallets||0).toLocaleString()}</div>
        <div style="font-size:10px;color:var(--text2)">${(grand[s]?.pcs||0).toLocaleString()} pcs</div>
      </div>`).join('')}
  </div>

  <div style="overflow-x:auto">
  <table class="sku-table" id="inv-summary-table">
    <thead>
      <tr>
        <th style="text-align:left;min-width:200px">CUSTOMER</th>
        <th style="text-align:right;color:var(--accent)">ACCURACY</th>
        ${allCols.map(s=>`<th style="text-align:right;color:${statusColors[s]}">${s}</th>`).join('')}
      </tr>
    </thead>
    <tbody>${rows}</tbody>
    <tfoot>
      <tr style="background:var(--surface2);border-top:3px solid var(--border)">
        <td style="font-weight:bold;font-size:16px;letter-spacing:1px">GRAND TOTAL</td>
        ${accCell(grand, true)}
        ${allCols.map(s=>`<td style="text-align:right;font-weight:bold;color:${statusColors[s]}">
          <div style="font-size:20px;font-weight:bold">${Math.round(grand[s]?.pallets||0).toLocaleString()}</div>
          <div style="font-size:10px;color:var(--text2)">${(grand[s]?.pcs||0).toLocaleString()} pcs</div>
        </td>`).join('')}
      </tr>
    </tfoot>
  </table>
  </div>`;

  document.getElementById('main-panel').innerHTML = '<div class="panel-inner" style="padding:20px">'+h+'</div>';
}

        <div id="inv-results">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:11px;color:var(--text2)">Showing ${st+1}–${Math.min(st+ps,tot)} of ${tot.toLocaleString()} records${skuFilter||locFilter||lotFilter||poFilter||custFilter?' (filtered)':''}</span>
          <div style="display:flex;gap:6px">
            ${page>0?`<button class="btn btn-sm" onclick="switchTab('inventory',${page-1})">← Prev</button>`:''}
            <span style="font-size:11px;color:var(--text2);padding:5px 8px">Page ${page+1}/${pg}</span>
            ${page<pg-1?`<button class="btn btn-sm" onclick="switchTab('inventory',${page+1})">Next →</button>`:''}
          </div>
        </div>
        <table class="sku-table" style="font-size:11px"><thead><tr>
          <th>CUSTOMER</th><th>SKU</th><th>NAME</th><th>PO #</th><th>PCS</th><th>PCS PENDING</th>
          <th>STATUS</th><th>LOT #</th><th>SKID ID</th><th>LOCATION</th>
          <th>EXP DATE</th><th>GROSS WT</th><th>INBOUND BOL</th>
        </tr></thead><tbody>`+
        (sl.length ? sl.map(r=>`<tr>
          <td style="color:${r.customer==='Nexus'?'var(--accent)':'var(--text2)'};font-weight:${r.customer==='Nexus'?'bold':'normal'}">${r.customer||'—'}</td>
          <td style="color:var(--accent)">${r.sku}</td>
          <td style="color:var(--text2)">${state.skuNames[r.sku]||'—'}</td>
          <td style="color:var(--text2)">${r.po||'—'}</td>
          <td>${r.pcs}</td>
          <td style="${r.pcsPending>0?'color:var(--warning);font-weight:bold':''}">${r.pcsPending||0}</td>
          <td style="color:var(--accent2)">${r.status||'—'}</td>
          <td style="color:var(--text2)">${r.lot||'—'}</td>
          <td style="color:var(--text2)">${r.skid||'—'}</td>
          <td>${r.location}</td>
          <td style="color:var(--text2)">${r.expDate?r.expDate.toLocaleDateString():'—'}</td>
          <td style="color:var(--text2)">${r.grossWt||'—'}</td>
          <td style="color:var(--text2)">${r.bol||'—'}</td>
        </tr>`).join('') : '<tr><td colspan="13" style="text-align:center;color:var(--text2);padding:20px">No records match the filter</td></tr>')+
        `</tbody></table></div>`;
    } else if (tab==='helper') {
      const ps=50, st=page*ps, sl=state.helper.slice(st,st+ps), tot=state.helper.length, pg=Math.ceil(tot/ps);
      html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:11px;color:var(--text2)">Showing ${st+1}–${Math.min(st+ps,tot)} of ${tot.toLocaleString()}</span><div style="display:flex;gap:6px">${page>0?`<button class="btn btn-sm" onclick="switchTab('helper',${page-1})">← Prev</button>`:''}<span style="font-size:11px;color:var(--text2);padding:5px 8px">Page ${page+1}/${pg}</span>${page<pg-1?`<button class="btn btn-sm" onclick="switchTab('helper',${page+1})">Next →</button>`:''}</div></div>`+
        `<table class="sku-table"><thead><tr><th>RANK</th><th>SKU</th><th>NAME</th><th>PALLET QTY</th><th>LOCATION</th><th>OLDEST EXP</th><th>AVAIL PALLETS</th></tr></thead><tbody>`+
        sl.map(r=>`<tr><td style="color:var(--text2)">${r.rank}</td><td style="color:var(--accent)">${r.sku}</td><td style="color:var(--text2)">${state.skuNames[r.sku]||'—'}</td><td>${r.palletQty}</td><td>${r.location}</td><td style="color:var(--text2)">${r.oldestExp?r.oldestExp.toLocaleDateString():'—'}</td><td style="color:var(--accent2);font-weight:bold">${r.availPallets}</td></tr>`).join('')+
        `</tbody></table>`;
    } else if (tab==='qty') {
      html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:11px;color:var(--text2)">${Object.keys(state.qtyGuide).length.toLocaleString()} SKUs in guide</span>
        <button class="btn btn-sm btn-primary" onclick="exportQtyGuide()" style="white-space:nowrap">⬇ Export QTY Guide (for editing)</button>
      </div>`+
        `<table class="sku-table"><thead><tr><th>SKU</th><th>NAME</th><th>QTY PER PALLET</th></tr></thead><tbody>`+
        Object.entries(state.qtyGuide).sort((a,b)=>a[0].localeCompare(b[0])).map(([sku,qty])=>`<tr><td style="color:var(--accent)">${sku}</td><td style="color:var(--text2)">${state.skuNames[sku]||'—'}</td><td style="color:var(--accent2);font-weight:bold">${qty}</td></tr>`).join('')+
        `</tbody></table>`;
    }
    document.getElementById('pcontent').innerHTML=html;
    if (tab==='inventory') setTimeout(()=>applyInvFilter('sku',(window.invFilters||{}).sku||''),50);
  };

  document.getElementById('main-panel').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div class="section-title" style="margin:0;border:none">DATA IMPORT PREVIEW</div>
      <button class="btn btn-sm" onclick="showDashboard()">← Back</button>
    </div>
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">Total Records</div><div class="stat-value">${state.inventory.length.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Unique SKUs</div><div class="stat-value green">${[...new Set(state.inventory.map(r=>r.sku))].length}</div></div>
      <div class="stat-card"><div class="stat-label">Unique Locations</div><div class="stat-value">${[...new Set(state.helper.map(h=>h.location))].length}</div></div>
      <div class="stat-card"><div class="stat-label">QTY Guide SKUs</div><div class="stat-value yellow">${Object.keys(state.qtyGuide).length}</div></div>
    </div>
    <div id="ptabs" style="display:flex;gap:8px;margin-bottom:16px"></div>
    <div id="pcontent" style="overflow-x:auto"></div>`;
  window.switchTab('locations');
}

// ─── ALERTS ───────────────────────────────────────────────────────────────────
function showAlert(msg,type) {
  let host=document.getElementById('toast-host');
  if(!host){ host=document.createElement('div'); host.id='toast-host'; host.className='toast-host'; document.body.appendChild(host); }
  const d=document.createElement('div');
  d.className='toast toast-'+(type||'info');
  d.textContent=msg;
  host.appendChild(d);
  setTimeout(()=>{
    d.style.transition='opacity .3s, transform .3s';
    d.style.opacity='0'; d.style.transform='translateY(-6px)';
    setTimeout(()=>{ d.remove(); if(host && !host.children.length) host.remove(); },300);
  },4200);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', function() {
  updateTicketList();
  localStorage.removeItem('pickflow_state');
  listenToFirebase();
// Load local inventory as fallback while Firebase connects
const _savedInv = localStorage.getItem('pickflow_inv');
if (_savedInv) {
  try {
    state.inventory = JSON.parse(_savedInv);
    state.inventory.forEach(r => { if (r.expDate) r.expDate = new Date(r.expDate); });
    try {
      const _savedRaw = localStorage.getItem('pickflow_rawinv');
      if (_savedRaw) {
        state.rawInventory = JSON.parse(_savedRaw);
        state.rawInventory.forEach(r => { if (r.expDate) r.expDate = new Date(r.expDate); });
      }
    } catch(e) {}
    if (Object.keys(state.qtyGuide).length > 0) {
      buildHelper();
      state.dataLoaded = true;
      document.getElementById('new-ticket-btn').disabled = false;
      document.getElementById('preview-btn').disabled = false;
      document.getElementById('rebuild-btn').style.display = 'flex';
      document.getElementById('data-status').innerHTML = '<span class="status-dot"></span>DATA LOADED: ' + state.inventory.length + ' RECORDS';
    } else {
      document.getElementById('data-status').innerHTML = '<span class="status-dot" style="background:var(--warning)"></span>IMPORT QTY GUIDE TO ACTIVATE';
    }
  } catch(e) {}
}
// Login screen shown by default — user must authenticate first
});
</script>
</body>
</html>
